<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jornada do Nosso Amor</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #narrativa { position: absolute; bottom: 5%; width: 100%; text-align: center; color: #fff; pointer-events: none; }
    </style>
</head>
<body>
    <div id="narrativa">
        <h2 id="frase">...</h2>
    </div>
    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.01, 50000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 1. TERRA (Com textura real e pontos de luz para representar pessoas)
        const earth = new THREE.Mesh(new THREE.SphereGeometry(1, 128, 128), new THREE.MeshBasicMaterial({ 
            map: new THREE.TextureLoader().load('https://eoimages.gsfc.nasa.gov/images/imagerecords/73000/73909/world.topo.bathy.200407.3x5400x2700.jpg') 
        }));
        scene.add(earth);

        // 2. SISTEMA SOLAR (Planetas reais)
        const system = new THREE.Group();
        const planets = [{d: 10, c: 0xff4422}, {d: 15, c: 0xffcc00}, {d: 20, c: 0x4488ff}];
        planets.forEach(p => {
            const m = new THREE.Mesh(new THREE.SphereGeometry(0.5, 64, 64), new THREE.MeshBasicMaterial({color: p.c}));
            m.position.x = p.d;
            system.add(m);
        });
        scene.add(system);

        // 3. VIA LÁCTEA (Fundo real)
        const galaxy = new THREE.Mesh(new THREE.SphereGeometry(5000, 64, 64), new THREE.MeshBasicMaterial({ 
            map: new THREE.TextureLoader().load('https://upload.wikimedia.org/wikipedia/commons/4/43/ESO-VLT-Laser-phot.jpg'), 
            side: THREE.BackSide 
        }));
        scene.add(galaxy);

        camera.position.z = 1.2; // Começa BEM perto (dentro da escala da Terra)
        
        let zPos = 1.2;
        window.addEventListener('wheel', (e) => {
            zPos = Math.max(1.2, Math.min(zPos + e.deltaY * 0.1, 4000));
            camera.position.z = zPos;
            
            const txt = document.getElementById('frase');
            if (zPos < 5) txt.innerText = "Em meio a bilhões de pessoas, nos encontramos.";
            else if (zPos < 50) txt.innerText = "Somos apenas um detalhe neste imenso sistema solar.";
            else txt.innerText = "Nada é mais vasto que o universo que criamos juntos.";
        }, {passive: false});

        function animate() {
            requestAnimationFrame(animate);
            earth.rotation.y += 0.001;
            system.rotation.y += 0.0005;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
