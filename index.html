<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jornada Espacial</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; }
        #narrativa { position: absolute; bottom: 10%; width: 100%; text-align: center; pointer-events: none; }
        /* Barra de Zoom Suave */
        #slider { position: absolute; bottom: 5%; left: 10%; width: 80%; z-index: 10; cursor: pointer; }
    </style>
</head>
<body>
    <input type="range" id="slider" min="0" max="100" value="0">
    <div id="narrativa"><p id="msg">Em meio a bilhões, nos encontramos.</p></div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.01, 100000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Grupo principal que escala tudo
        const universe = new THREE.Group();
        scene.add(universe);

        // Terra com texturas de qualidade
        const earth = new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), new THREE.MeshBasicMaterial({ color: 0x2244ff }));
        universe.add(earth);

        // Sol e Planetas Reais
        const sun = new THREE.Mesh(new THREE.SphereGeometry(2, 64, 64), new THREE.MeshBasicMaterial({ color: 0xffcc00 }));
        sun.position.set(10, 0, 0);
        universe.add(sun);

        // Galáxia (Fundo denso de estrelas)
        const stars = new THREE.Points(new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(new Float32Array(100000), 3)), new THREE.PointsMaterial({ size: 0.1 }));
        scene.add(stars);

        // Mecanismo de Zoom: O Slider altera a escala do universo, não a posição da câmera
        const slider = document.getElementById('slider');
        slider.oninput = (e) => {
            const val = e.target.value;
            // Escala exponencial: quanto mais puxa, mais o universo inteiro encolhe
            const scale = Math.pow(0.95, val);
            universe.scale.set(scale, scale, scale);
            
            const m = document.getElementById('msg');
            if (val < 20) m.innerText = "Em meio a bilhões de pessoas, nos encontramos.";
            else if (val < 60) m.innerText = "O Sistema Solar é um detalhe...";
            else m.innerText = "A Via Láctea inteira cabe no que sentimos.";
        };

        camera.position.z = 5;
        function animate() {
            requestAnimationFrame(animate);
            earth.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
