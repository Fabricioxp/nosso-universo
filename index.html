<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossa Jornada</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: white; font-family: 'Arial', sans-serif; }
        #ui { position: absolute; bottom: 20%; width: 100%; text-align: center; pointer-events: none; padding: 20px; transition: opacity 2s; }
        #msg { font-size: 1.5rem; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>

<div id="ui">
    <h1 id="msg">Você é o meu mundo</h1>
    <p id="sub">Role para afastar e ver a imensidão que nos cerca.</p>
</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 10000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Textura da Terra (Realista)
    const loader = new THREE.TextureLoader();
    const earthTexture = loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg');
    
    // Terra
    const earth = new THREE.Mesh(
        new THREE.SphereGeometry(1, 64, 64),
        new THREE.MeshBasicMaterial({ map: earthTexture })
    );
    scene.add(earth);

    // Galáxia (Fundo realista)
    const starGeometry = new THREE.BufferGeometry();
    const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 });
    const stars = new THREE.Points(starGeometry, starMaterial);
    scene.add(stars);

    camera.position.z = 3;
    let zoomLevel = 3;

    window.addEventListener('wheel', (e) => {
        zoomLevel = Math.max(3, Math.min(zoomLevel + e.deltaY * 0.5, 2000));
        camera.position.z = zoomLevel;
    }, {passive: false});

    function animate() {
        requestAnimationFrame(animate);
        earth.rotation.y += 0.002;
        
        // Atualizar mensagens conforme zoom
        const msg = document.getElementById('msg');
        if (zoomLevel < 100) { msg.innerText = "Em meio a bilhões, nos encontramos."; }
        else if (zoomLevel < 800) { msg.innerText = "O Sistema Solar é um grão de areia."; }
        else { msg.innerText = "Meu amor por você é maior que a Via Láctea."; }
        
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
