<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nosso Universo Infinito</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #interface {
            position: absolute; top: 10%; width: 100%; text-align: center;
            color: #fff; pointer-events: none; font-family: 'Segoe UI', sans-serif;
            transition: opacity 1s ease-in-out;
        }
    </style>
</head>
<body>

<div id="interface">
    <h1 id="titulo">Nós</h1>
    <p id="sub">Em meio a bilhões de pessoas, a sorte de nos encontrarmos.</p>
</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

    // --- CONFIGURAÇÃO DO MOTOR ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 20000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- 1. TERRA (O FOCO INICIAL) ---
    const earthGroup = new THREE.Group();
    const loader = new THREE.TextureLoader();
    const earthGeo = new THREE.SphereGeometry(1, 128, 128);
    const earthMat = new THREE.MeshPhongMaterial({ 
        map: loader.load('https://eoimages.gsfc.nasa.gov/images/imagerecords/73000/73909/world.topo.bathy.200407.3x5400x2700.jpg'),
        bumpScale: 0.05
    });
    const earth = new THREE.Mesh(earthGeo, earthMat);
    earthGroup.add(earth);
    scene.add(earthGroup);

    // --- 2. SISTEMA SOLAR (PLANO DE PROFUNDIDADE MÉDIO) ---
    const planetGroup = new THREE.Group();
    const planetData = [ {dist: 5, size: 0.3, color: 0xff4422}, {dist: 9, size: 0.5, color: 0xffcc00} ];
    planetData.forEach(data => {
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(data.size, 64, 64), new THREE.MeshBasicMaterial({ color: data.color }));
        mesh.position.x = data.dist;
        planetGroup.add(mesh);
    });
    scene.add(planetGroup);

    // --- 3. VIA LÁCTEA (SISTEMA DE PARTÍCULAS DENSO) ---
    const galaxyGeo = new THREE.BufferGeometry();
    const count = 80000;
    const positions = new Float32Array(count * 3);
    for(let i=0; i<count*3; i++) positions[i] = (Math.random()-0.5) * 8000;
    galaxyGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const galaxy = new THREE.Points(galaxyGeo, new THREE.PointsMaterial({ size: 0.5, color: 0xffffff }));
    scene.add(galaxy);

    // --- CONTROLE DE NAVEGAÇÃO E ZOOM ---
    camera.position.z = 3;
    let targetZ = 3;

    window.addEventListener('wheel', (e) => {
        targetZ = Math.max(3, Math.min(targetZ + e.deltaY * 0.2, 5000));
        
        // Atualização Dinâmica da Narrativa
        const tit = document.getElementById('titulo');
        const sub = document.getElementById('sub');
        if (targetZ < 20) { tit.innerText = "Nós"; sub.innerText = "Em meio a bilhões, nos encontramos."; }
        else if (targetZ < 500) { tit.innerText = "Sistema Solar"; sub.innerText = "Tão vasto, mas insignificante perto do que sentimos."; }
        else { tit.innerText = "Via Láctea"; sub.innerText = "O Universo inteiro conspirou para o nosso encontro."; }
    }, {passive: false});

    // --- LOOP DE RENDERIZAÇÃO FÍSICA ---
    function animate() {
        requestAnimationFrame(animate);
        camera.position.z += (targetZ - camera.position.z) * 0.05;
        earth.rotation.y += 0.001;
        planetGroup.rotation.y += 0.0003;
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
