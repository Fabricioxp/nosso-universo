<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Universo da Maria</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000000; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        /* Oculta o canvas do 3D inicialmente para não vazar a imagem da Terra antes da hora */
        canvas { opacity: 0; transition: opacity 2s ease-in-out; display: block; }
        canvas.show { opacity: 1; }

        /* Tela de Introdução Inicial */
        #intro { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #11091c 0%, #010105 100%); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; transition: opacity 1.5s ease-in-out; opacity: 1; }
        #intro h1 { font-size: 2.5rem; margin-bottom: 15px; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; background: linear-gradient(45deg, #ff6b8b, #ff8e53); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #intro p { font-size: 1rem; max-width: 500px; color: #cbbad6; margin-bottom: 35px; line-height: 1.6; padding: 0 20px; font-weight: 300; }
        #btn-start { padding: 15px 45px; font-size: 1rem; color: #fff; background: linear-gradient(45deg, rgba(255,107,139,0.4), rgba(255,142,83,0.4)); border: 1px solid rgba(255,255,255,0.3); border-radius: 50px; cursor: pointer; backdrop-filter: blur(10px); transition: all 0.4s; letter-spacing: 2px; text-transform: uppercase; }
        #btn-start:hover { background: #fff; color: #ff6b8b; box-shadow: 0 0 30px rgba(255,107,139,0.6); border-color: #fff; transform: scale(1.03); }

        /* Tela Preta da Narrativa Interativa */
        #narrativa-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #000000; z-index: 1500; display: none; align-items: center; justify-content: center; color: white; text-align: center; transition: opacity 1.5s ease-in-out; }
        #legenda-texto { font-size: 1.6rem; max-width: 80%; font-weight: 300; line-height: 1.6; letter-spacing: 2px; color: #e5def0; opacity: 0; transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out; transform: translateY(10px); text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        #legenda-texto.show { opacity: 1; transform: translateY(0); }
        #legenda-texto.luz { background: linear-gradient(45deg, #ffffff, #ffb3c6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 400; text-shadow: 0 0 30px rgba(255,158,187,0.9), 0 0 10px rgba(255,255,255,0.5); font-style: italic; font-size: 2.4rem; transform: scale(1.05); }

        /* HUD Delicado */
        #hud { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 480px; text-align: center; color: white; z-index: 10; pointer-events: none; opacity: 0; transition: opacity 0.8s, transform 0.8s; background: rgba(6, 3, 11, 0.75); padding: 15px 25px; border-radius: 16px; border: 1px solid rgba(255, 107, 139, 0.25); box-shadow: 0 10px 30px rgba(0,0,0,0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        #msg-title { font-size: 1.3rem; font-weight: 600; margin: 0 0 6px 0; color: #ff9ebb; text-shadow: 0 2px 10px rgba(255,107,139,0.4); }
        #msg-body { font-size: 0.9rem; margin: 0; color: #e5def0; font-weight: 400; line-height: 1.5; }

        /* Menu de Navegação */
        #nav-container { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 20; display: flex; flex-direction: column; align-items: center; gap: 8px; width: 90%; max-width: 750px; display: none; }
        #nav-menu { display: flex; gap: 6px; background: rgba(5, 3, 10, 0.6); padding: 6px 12px; border-radius: 30px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); flex-wrap: wrap; justify-content: center; transition: all 0.4s ease; max-height: 200px; overflow: hidden; }
        #nav-menu.hidden { max-height: 0; padding: 0; border: none; opacity: 0; pointer-events: none; }
        
        .nav-btn { background: transparent; border: none; color: #b5a9c0; padding: 6px 12px; border-radius: 15px; cursor: pointer; font-size: 0.82rem; transition: all 0.2s; font-weight: 500; }
        .nav-btn:hover { color: #fff; background: rgba(255, 107, 139, 0.2); }
        .nav-btn.active { color: #fff; text-shadow: 0 0 5px #fff; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2); }
        .nav-btn.visto { color: #2ecc71 !important; text-shadow: 0 0 8px rgba(46, 204, 113, 0.6); }
        .nav-btn.align-btn { background: linear-gradient(45deg, #ff6b8b, #ff8e53); color: white; font-weight: bold; }
        
        /* Controles */
        .top-controls { display: flex; gap: 10px; }
        .top-btn { background: rgba(255, 107, 139, 0.2); border: 1px solid rgba(255, 107, 139, 0.4); color: #ff9ebb; padding: 4px 14px; border-radius: 20px; cursor: pointer; font-size: 0.75rem; font-weight: 600; letter-spacing: 1px; backdrop-filter: blur(5px); transition: all 0.3s; }
        .top-btn:hover { background: rgba(255, 107, 139, 0.4); color: #fff; }

        /* Botão Big Bang */
        #btn-finale { background: linear-gradient(45deg, #2ecc71, #1abc9c); border: 1px solid #fff; color: #fff; display: none; }
        #btn-finale.show { display: inline-block; animation: pulsarBotao 1.5s infinite alternate; }
        @keyframes pulsarBotao { from { box-shadow: 0 0 8px rgba(46,204,113,0.6); transform: scale(1); } to { box-shadow: 0 0 20px rgba(26,188,156,1); transform: scale(1.04); } }

        /* Overlay de Transições */
        #fade-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: #fff; z-index: 2000; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="fade-overlay"></div>

    <audio id="audio-criador" crossorigin="anonymous">
        <source src="criador.mp3" type="audio/mpeg">
    </audio>

    <audio id="musica-fundo" loop crossorigin="anonymous">
        <source src="principal.mp3" type="audio/mpeg">
    </audio>

    <audio id="audio-explosao" crossorigin="anonymous">
        <source src="final.mp3" type="audio/mpeg">
    </audio>

    <div id="intro">
        <h1>O Universo de Nós Dois</h1>
        <p>Um espaço inteirinho criado para te mostrar que você mudou completamente a minha vida. Você é o meu mundo.</p>
        <button id="btn-start" onclick="iniciarIntroducao()">Iniciar Passeio</button>
    </div>

    <div id="narrativa-screen">
        <div id="legenda-texto"></div>
    </div>

    <div id="nav-container">
        <div class="top-controls">
            <button id="toggle-menu" class="top-btn" onclick="AlternarMenu()">Esconder Painel 👁️</button>
            <button id="toggle-audio" class="top-btn" onclick="AlternarAudio()">Pausar Música ⏸️</button>
            <button id="btn-finale" class="top-btn" onclick="dispararExplosao()">💥 ATIVAR BIG BANG</button>
        </div>
        <div id="nav-menu">
            <button class="nav-btn" data-id="galaxy" onclick="mudarFoco('galaxy')">🌌 Via-Láctea</button>
            <button class="nav-btn" data-id="sun" onclick="mudarFoco('sun')">☀️ Sol</button>
            <button class="nav-btn" data-id="mercurio" onclick="mudarFoco('mercurio')">Mercúrio</button>
            <button class="nav-btn" data-id="venus" onclick="mudarFoco('venus')">Vênus</button>
            <button class="nav-btn active" data-id="earth" onclick="mudarFoco('earth')">🌍 Terra</button>
            <button class="nav-btn" data-id="marte" onclick="mudarFoco('marte')">Marte</button>
            <button class="nav-btn" data-id="jupiter" onclick="mudarFoco('jupiter')">Júpiter</button>
            <button class="nav-btn" data-id="saturno" onclick="mudarFoco('saturno')">🪐 Maria (Saturno)</button>
            <button class="nav-btn" data-id="urano" onclick="mudarFoco('urano')">Urano</button>
            <button class="nav-btn" data-id="netuno" onclick="mudarFoco('netuno')">Netuno</button>
            <button class="nav-btn" data-id="plutao" onclick="mudarFoco('plutao')">Plutão</button>
            <button class="nav-btn align-btn" onclick="alinharCamera()">✨ Focar de Perto</button>
        </div>
    </div>
    
    <div id="hud">
        <h2 id="msg-title">Calculando órbitas...</h2>
        <p id="msg-body">Alinhando estrelas para a Maria.</p>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 500000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const loader = new THREE.TextureLoader();
        let focoAtual = 'earth';
        let explodindo = false;
        
        const cameraPosBase = new THREE.Vector3();
        const cameraTargetBase = new THREE.Vector3();
        let intensidadeTremor = 0;
        let flashDisparado = false;

        let audioCtx, audioSource, filterNode, gainNode;
        const audioTag = document.getElementById('musica-fundo');
        const audioExploTag = document.getElementById('audio-explosao');
        const audioCriadorTag = document.getElementById('audio-criador');
        const overlay = document.getElementById('fade-overlay');

        // FUNÇÃO AUXILIAR PARA GERAR TEXTURA DE FAIXAS (PARA SATURNO E JÚPITER)
        function gerarTexturaFaixas(corBase, corFaixa) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = corBase; ctx.fillRect(0, 0, 256, 128);
            for (let i = 0; i < 128; i += Math.random() * 12 + 4) {
                ctx.fillStyle = Math.random() > 0.4 ? corFaixa : corBase;
                ctx.globalAlpha = Math.random() * 0.25;
                ctx.fillRect(0, i, 256, Math.random() * 10 + 2);
            }
            return new THREE.CanvasTexture(canvas);
        }

        function inicializarAudioEfeitos() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                audioSource = audioCtx.createMediaElementSource(audioTag);
                
                filterNode = audioCtx.createBiquadFilter();
                filterNode.type = 'lowpass';
                filterNode.frequency.setValueAtTime(22000, audioCtx.currentTime); 
                
                gainNode = audioCtx.createGain();
                gainNode.gain.setValueAtTime(1.0, audioCtx.currentTime);

                audioSource.connect(filterNode);
                filterNode.connect(gainNode);
                gainNode.connect(audioCtx.destination);
            }
        }

        const planetasParaVerificar = ['galaxy', 'sun', 'mercurio', 'venus', 'earth', 'marte', 'jupiter', 'saturno', 'urano', 'netuno', 'plutao'];
        let planetasVistos = new Set();

        const posicoesGlobais = { 
            sun: new THREE.Vector3(20000, 0, 0), galaxy: new THREE.Vector3(0, 4000, 0),
            mercurio: new THREE.Vector3(20060, 0, 0), venus: new THREE.Vector3(20095, 0, 0),
            earth: new THREE.Vector3(20145, 0, 0), marte: new THREE.Vector3(20195, 0, 0),
            jupiter: new THREE.Vector3(20260, 0, 0), saturno: new THREE.Vector3(20340, 0, 0),
            urano: new THREE.Vector3(20420, 0, 0), netuno: new THREE.Vector3(20500, 0, 0),
            plutao: new THREE.Vector3(20560, 0, 0)
        };

        // VIA LÁCTEA COORDENADAS E VELOCIDADES
        const galaxyGeometry = new THREE.BufferGeometry();
        const gPoints = 170000;
        const gPositions = new Float32Array(gPoints * 3);
        const gColors = new Float32Array(gPoints * 3);
        const gVelocities = new Float32Array(gPoints * 3); 
        
        const colCore = new THREE.Color('#ff7ea5'); 
        const colArm = new THREE.Color('#4c3b99');  

        for(let i = 0; i < gPoints; i++) {
            const i3 = i * 3;
            const r = Math.pow(Math.random(), 2.5) * 65000; 
            const arms = 4;
            const theta = ((i % arms) / arms) * Math.PI * 2 + (r * 0.00006); 

            const spread = Math.pow(Math.random(), 2) * (Math.random() < 0.5 ? 1 : -1) * r * 0.12;
            const ySpread = (Math.random() - 0.5) * (65000 - r) * 0.04;

            gPositions[i3] = Math.cos(theta) * r + spread;
            gPositions[i3+1] = ySpread;
            gPositions[i3+2] = Math.sin(theta) * r + (Math.random() - 0.5) * r * 0.12;

            const finalCol = colCore.clone().lerp(colArm, r / 65000);
            if(Math.random() > 0.96) finalCol.addScalar(0.4); 
            
            gColors[i3] = finalCol.r;
            gColors[i3+1] = finalCol.g;
            gColors[i3+2] = finalCol.b;

            const angle1 = Math.random() * Math.PI * 2;
            const angle2 = Math.acos((Math.random() * 2) - 1);
            const speed = 4000 + Math.random() * 6000; 
            gVelocities[i3] = Math.sin(angle2) * Math.cos(angle1) * speed;
            gVelocities[i3+1] = Math.sin(angle2) * Math.sin(angle1) * speed;
            gVelocities[i3+2] = Math.cos(angle2) * speed;
        }
        galaxyGeometry.setAttribute('position', new THREE.BufferAttribute(gPositions, 3));
        galaxyGeometry.setAttribute('color', new THREE.BufferAttribute(gColors, 3));

        const pCanvas = document.createElement('canvas'); pCanvas.width = 16; pCanvas.height = 16;
        const gCtx = pCanvas.getContext('2d');
        const grad = gCtx.createRadialGradient(8,8,0, 8,8,8);
        grad.addColorStop(0, 'rgba(255,255,255,1)'); grad.addColorStop(1, 'rgba(255,255,255,0)');
        gCtx.fillStyle = grad; gCtx.fillRect(0,0,16,16);

        const galaxyMaterial = new THREE.PointsMaterial({
            size: 110, sizeAttenuation: true, depthWrite: false,
            blending: THREE.AdditiveBlending, vertexColors: true,
            transparent: true, map: new THREE.CanvasTexture(pCanvas), opacity: 0.85
        });
        const galaxy = new THREE.Points(galaxyGeometry, galaxyMaterial);
        scene.add(galaxy);

        // Estrelas cadentes
        const lineMat = new THREE.LineBasicMaterial({ color: 0xff758c, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
        const shootingStars = [];
        for(let i=0; i<4; i++) {
            const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(-300, -150, -300)]);
            const line = new THREE.Line(lineGeo, lineMat);
            line.position.set((Math.random()-0.5)*40000, (Math.random()-0.5)*10000, (Math.random()-0.5)*40000);
            scene.add(line);
            shootingStars.push({ mesh: line, speed: 20 + Math.random()*20 });
        }

        // SISTEMA SOLAR
        const solarSystem = new THREE.Group();
        solarSystem.position.set(20000, 0, 0);
        scene.add(solarSystem);

        scene.add(new THREE.AmbientLight(0x443a5e));
        const sunLight = new THREE.PointLight(0xfff5ea, 3, 80000);
        solarSystem.add(sunLight);

        // O SOL REALISTA
        const sunMat = new THREE.MeshStandardMaterial({ 
            color: 0xffffff, 
            roughness: 0.9,
            metalness: 0.1,
            emissive: 0xff7700, 
            emissiveIntensity: 1.5 
        });

        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/lava/lavatile.jpg', (tex) => {
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(2, 1);
            sunMat.map = tex; 
            sunMat.needsUpdate = true;
        });

        const sun = new THREE.Mesh(new THREE.SphereGeometry(35, 64, 64), sunMat);
        
        const sunGlowMat = new THREE.MeshBasicMaterial({ 
            color: 0xff5500, 
            transparent: true, 
            opacity: 0.4, 
            side: THREE.BackSide,
            blending: THREE.AdditiveBlending 
        });
        const sunGlow = new THREE.Mesh(new THREE.SphereGeometry(42, 32, 32), sunGlowMat);
        sun.add(sunGlow);
        solarSystem.add(sun);

        // TERRA
        const earthGroup = new THREE.Group();
        const earthMat = new THREE.MeshStandardMaterial({ color: 0x2b82c9, roughness: 0.4 });
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg', (tex) => {
            earthMat.map = tex; earthMat.color.setHex(0xffffff); earthMat.needsUpdate = true;
        });

        const earth = new THREE.Mesh(new THREE.SphereGeometry(7.5, 64, 64), earthMat);
        earthGroup.add(earth);

        const luaGeo = new THREE.SphereGeometry(2.0, 48, 48); 
        const luaMat = new THREE.MeshStandardMaterial({ color: 0xff4b72, roughness: 0.9, metalness: 0.0 });
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/moon_1024.jpg', (tex) => {
            luaMat.bumpMap = tex; luaMat.bumpScale = 0.08; luaMat.needsUpdate = true;
        });

        const moon = new THREE.Mesh(luaGeo, luaMat);
        moon.position.set(22, 2, 0);
        earthGroup.add(moon);
        solarSystem.add(earthGroup);

        // SATURNO (MELHORADO COM TEXTURA DE FAIXAS SUTIS)
        const saturnoGroup = new THREE.Group();
        const saturnoMesh = new THREE.Mesh(
            new THREE.SphereGeometry(13.5, 64, 64), 
            new THREE.MeshStandardMaterial({ 
                map: gerarTexturaFaixas('#e2bf7d', '#b0945d'), 
                roughness: 0.6 
            })
        );
        saturnoGroup.add(saturnoMesh);

        // Anéis detalhados de Saturno
        const rGeo = new THREE.RingGeometry(16, 30, 64);
        const rMat = new THREE.MeshStandardMaterial({ 
            map: gerarTexturaFaixas('#d2af6d', '#7d6438'), 
            side: THREE.DoubleSide, transparent: true, opacity: 0.8 
        });
        const rMesh = new THREE.Mesh(rGeo, rMat); rMesh.rotation.x = Math.PI/2.2;
        saturnoGroup.add(rMesh);

        const nameCanvas = document.createElement('canvas'); nameCanvas.width = 512; nameCanvas.height = 128;
        const nCtx = nameCanvas.getContext('2d');
        nCtx.fillStyle = 'rgba(0,0,0,0)'; nCtx.fillRect(0,0,512,128);
        nCtx.font = 'Bold 60px sans-serif'; nCtx.fillStyle = '#ff9ebb'; nCtx.textAlign = 'center';
        nCtx.shadowColor = '#ff3366'; nCtx.shadowBlur = 15;
        nCtx.fillText('❤️ MARIA ❤️', 256, 80);
        
        const nameTex = new THREE.CanvasTexture(nameCanvas);
        const nameSpriteMat = new THREE.SpriteMaterial({ map: nameTex, transparent: true });
        const nameSprite = new THREE.Sprite(nameSpriteMat);
        nameSprite.position.set(0, 22, 0); 
        nameSprite.scale.set(35, 9, 1);
        saturnoGroup.add(nameSprite);
        solarSystem.add(saturnoGroup);

        // PLANETAS (MARTE COM RELEVO E JÚPITER/URANO/NETUNO COM MAIS DETALHES)
        const infoPlanetas = [
            { name: 'mercurio', size: 2.5, dist: 60, color: 0x999999, speed: 0.004, procedural: false },
            { name: 'venus', size: 5.8, dist: 95, color: 0xe3bb87, speed: 0.003, procedural: false },
            { name: 'marte', size: 4.0, dist: 195, color: 0xc1440e, speed: 0.0016, procedural: false, relevo: true },
            { name: 'jupiter', size: 17.5, dist: 260, color: 0xd4a373, speed: 0.001, procedural: true, corFaixa: '#8a6442' },
            { name: 'urano', size: 9.0, dist: 420, color: 0x3ae5d9, speed: 0.0005, procedural: true, corFaixa: '#21968f' },
            { name: 'netuno', size: 8.5, dist: 500, color: 0x7832cc, speed: 0.0003, procedural: true, corFaixa: '#471682' },
            { name: 'plutao', size: 1.5, dist: 560, color: 0x8a7b68, speed: 0.0002, procedural: false }
        ];

        const meshesPlanetas = {};
        infoPlanetas.forEach(p => {
            const grupo = new THREE.Group();
            let mat;
            
            if (p.procedural) {
                mat = new THREE.MeshStandardMaterial({ 
                    map: gerarTexturaFaixas('#' + p.color.toString(16), p.corFaixa), 
                    roughness: 0.6 
                });
            } else {
                mat = new THREE.MeshStandardMaterial({ color: p.color, roughness: 0.7 });
                if (p.relevo) {
                    loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/moon_1024.jpg', (tex) => {
                        mat.bumpMap = tex;
                        mat.bumpScale = 0.05; // relevo leve nativo da lua, sem herdar a Terra
                        mat.needsUpdate = true;
                    });
                }
            }

            const mesh = new THREE.Mesh(new THREE.SphereGeometry(p.size, 48, 48), mat);
            grupo.add(mesh);
            solarSystem.add(grupo);
            meshesPlanetas[p.name] = { group: grupo, mesh: mesh, dist: p.dist, angle: Math.random()*10, speed: p.speed, originalDist: p.dist };
        });

        meshesPlanetas['earth'] = { group: earthGroup, mesh: earth, dist: 145, angle: 1, speed: 0.002, originalDist: 145 };
        meshesPlanetas['saturno'] = { group: saturnoGroup, mesh: saturnoMesh, dist: 340, angle: 5, speed: 0.0008, originalDist: 340 };

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05;
        controls.minDistance = 10; controls.maxDistance = 100000;

        camera.position.set(20140, 15, 25);
        controls.target.set(20140, 0, 0);

        const uiTitle = document.getElementById('msg-title');
        const uiBody = document.getElementById('msg-body');

        // Legendas sincronizadas com precisão
        const legendasCriador = [
            { tempo: 0.0, texto: "No princípio..." },
            { tempo: 2.2, texto: "Não havia nada." },
            { tempo: 5.5, texto: "Nada além do silêncio de trevas sem fim." },
            { tempo: 11.0, texto: "Mas o criador soprou perante o grande vazio, and sussurrou:" },
            { tempo: 15.3, texto: "Faça-se a luz.", classe: "luz" }
        ];

        let transicaoIniciada = false;
        let intervalLegendas = null;

        window.iniciarIntroducao = () => {
            inicializarAudioEfeitos();
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            if (intervalLegendas) clearInterval(intervalLegendas);
            transicaoIniciada = false;

            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                
                const screenNarrativa = document.getElementById('narrativa-screen');
                screenNarrativa.style.display = 'flex';
                screenNarrativa.style.opacity = '1';

                document.getElementById('legenda-texto').innerText = "";
                document.getElementById('legenda-texto').classList.remove('show', 'luz');

                audioCriadorTag.currentTime = 0;
                audioCriadorTag.volume = 1.0;
                audioCriadorTag.play().catch(e => console.log("Erro áudio introdução:", e));
            }, 1500);

            intervalLegendas = setInterval(() => {
                const tempoAtual = audioCriadorTag.currentTime;
                let legendaAtiva = null;

                for (let i = 0; i < legendasCriador.length; i++) {
                    if (tempoAtual >= legendasCriador[i].tempo) {
                        legendaAtiva = legendasCriador[i];
                    }
                }

                const elLegenda = document.getElementById('legenda-texto');
                if (legendaAtiva) {
                    if (elLegenda.innerText !== legendaAtiva.texto) {
                        elLegenda.classList.remove('show', 'luz');
                        
                        setTimeout(() => {
                            elLegenda.innerText = legendaAtiva.texto;
                            if (legendaAtiva.classe) elLegenda.classList.add(legendaAtiva.classe);
                            elLegenda.classList.add('show');
                        }, 50);
                    }
                }

                if (tempoAtual >= 15.3 && !transicaoIniciada) {
                    transicaoIniciada = true;
                    
                    setTimeout(() => {
                        if (intervalLegendas) clearInterval(intervalLegendas);
                        const screenNarrativa = document.getElementById('narrativa-screen');
                        screenNarrativa.style.opacity = '0';

                        setTimeout(() => {
                            screenNarrativa.style.display = 'none';
                            iniciarUniversoNormal();
                        }, 1200);
                    }, 3500);
                }
            }, 20);
        };

        function iniciarUniversoNormal() {
            document.querySelector('canvas').classList.add('show');
            document.getElementById('nav-container').style.display = 'flex';
            document.getElementById('hud').style.opacity = '1';
            
            audioTag.currentTime = 0; 
            audioTag.volume = 0.3; 
            audioTag.play().catch(e => console.log("Erro música principal:", e));
            mudarFoco('earth');
        }

        window.mudarFoco = (alvo) => {
            if(explodindo) return;
            focoAtual = alvo;
            
            planetasVistos.add(alvo);
            const btnLido = document.querySelector(`.nav-btn[data-id="${alvo}"]`);
            if(btnLido) btnLido.classList.add('visto');

            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(btnLido) btnLido.classList.add('active');

            if(textos[alvo]) {
                uiTitle.innerText = textos[alvo].title;
                uiBody.innerText = textos[alvo].body;
            }

            const p = obterPosicaoFoco();
            if(alvo === 'galaxy') {
                camera.position.set(0, 48000, 52000);
                controls.target.set(0, 0, 0);
            } else {
                const offset = (alvo === 'sun' || alvo === 'saturno') ? 70 : 30;
                camera.position.set(p.x + offset, p.y + 8, p.z + offset);
                controls.target.copy(p);
            }
            controls.update();

            if (planetasParaVerificar.every(p => planetasVistos.has(p))) {
                document.getElementById('btn-finale').classList.add('show');
            }
        };

        window.alinharCamera = () => {
            if(explodindo) return;
            const p = obterPosicaoFoco();
            if(focoAtual === 'galaxy') {
                camera.position.set(0, 48000, 52000);
                controls.target.set(0, 0, 0);
            } else {
                const offset = (focoAtual === 'sun' || focoAtual === 'saturno') ? 65 : 25;
                camera.position.set(focoAtual === 'sun' ? p.x + offset : p.x + offset, p.y + 10, p.z + offset);
                controls.target.copy(p);
            }
            controls.update();
        };

        window.AlternarMenu = () => {
            const menu = document.getElementById('nav-menu');
            const btn = document.getElementById('toggle-menu');
            if(menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
                btn.innerText = "Esconder Painel 👁️";
            } else {
                menu.classList.add('hidden');
                btn.innerText = "Mostrar Planetas 🪐";
            }
        };

        window.AlternarAudio = () => {
            const btn = document.getElementById('toggle-audio');
            if (audioTag.paused) {
                audioTag.play();
                btn.innerText = "Pausar Música ⏸️";
            } else {
                audioTag.pause();
                btn.innerText = "Tocar Música ▶️";
            }
        };

        window.dispararExplosao = () => {
            explodindo = true;
            focoAtual = 'galaxy'; 
            intensidadeTremor = 0;
            flashDisparado = false;
            
            inicializarAudioEfeitos();

            document.getElementById('nav-container').style.display = 'none';
            document.getElementById('hud').style.opacity = '0'; 

            controls.enabled = false; 
            
            cameraPosBase.set(0, 32000, 43000);
            cameraTargetBase.set(0, 0, 0);

            overlay.style.opacity = '0';
            overlay.style.backgroundColor = '#ffffff';
            overlay.style.transition = 'none'; 

            audioExploTag.currentTime = 0;
            audioExploTag.volume = 1.0;
            audioExploTag.play().catch(e => console.log("Erro ao tocar áudio final:", e));

            if (filterNode && gainNode && audioCtx) {
                filterNode.frequency.setValueAtTime(filterNode.frequency.value, audioCtx.currentTime);
                filterNode.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 1.2); 
                gainNode.gain.setValueAtTime(gainNode.gain.value, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.0, audioCtx.currentTime + 1.4); 
            }

            audioExploTag.onended = () => {
                overlay.style.transition = 'opacity 1.5s ease-out';
                overlay.style.backgroundColor = '#010105'; 
                overlay.style.opacity = '1';

                setTimeout(() => {
                    audioTag.pause();
                    audioExploTag.pause();
                    audioCriadorTag.pause();
                    window.location.reload(); 
                }, 1000);
            };
        };

        function obterPosicaoFoco() {
            if(focoAtual === 'galaxy') return new THREE.Vector3(0,0,0);
            if(focoAtual === 'sun') return solarSystem.position;
            const p = posicoesGlobais[focoAtual];
            return p ? p : new THREE.Vector3(20000, 0, 0);
        }

        function animate() {
            requestAnimationFrame(animate);

            const tempo = Date.now() * 0.0005;

            if (explodindo) {
                const segs = audioExploTag.currentTime;
                const duracaoTotal = audioExploTag.duration || 4.0; 
                
                if (segs < 1.2) {
                    intensidadeTremor = 45 + (segs * 50); 
                    
                    const posAttr = galaxyGeometry.attributes.position;
                    const colAttr = galaxyGeometry.attributes.color;
                    
                    for (let i = 0; i < gPoints; i++) {
                        const i3 = i * 3;
                        posAttr.array[i3] *= 0.91; 
                        posAttr.array[i3+1] *= 0.90;
                        posAttr.array[i3+2] *= 0.91;

                        colAttr.array[i3] = Math.min(colAttr.array[i3] + 0.05, 1.0);
                        colAttr.array[i3+1] *= 0.85;
                        colAttr.array[i3+2] *= 0.82;
                    }
                    posAttr.needsUpdate = true;
                    colAttr.needsUpdate = true;
                    
                    galaxy.rotation.y += 0.15; 
                    solarSystem.position.lerp(new THREE.Vector3(0, 0, 0), 0.12);
                    solarSystem.scale.multiplyScalar(0.90);
                    
                    if(audioTag.volume > 0) audioTag.volume = 0;
                }
                else {
                    const tExplo = (segs - 1.2);
                    intensidadeTremor = Math.max(750 - (tExplo * 190), 40); 

                    if (!flashDisparado) {
                        overlay.style.opacity = '1';
                        overlay.style.transition = 'none'; 
                        flashDisparado = true;
                        cameraPosBase.set(0, 68000, 85000); 
                    } else {
                        overlay.style.transition = 'opacity 1.6s cubic-bezier(0.1, 0.9, 0.2, 1)';
                        overlay.style.opacity = Math.max(1 - (tExplo * 0.65), 0);
                    }

                    const posAttr = galaxyGeometry.attributes.position;
                    const colAttr = galaxyGeometry.attributes.color;
                    const fatorDesaceleracao = Math.max(1.4 - (tExplo * 0.3), 0.08);

                    for (let i = 0; i < gPoints; i++) {
                        const i3 = i * 3;
                        posAttr.array[i3] += gVelocities[i3] * 0.055 * fatorDesaceleracao;
                        posAttr.array[i3+1] += gVelocities[i3+1] * 0.055 * fatorDesaceleracao;
                        posAttr.array[i3+2] += gVelocities[i3+2] * 0.055 * fatorDesaceleracao;

                        colAttr.array[i3] = Math.max(1.0 - tExplo * 0.35, 0.15);
                        colAttr.array[i3+1] = Math.min(0.35 + tExplo * 0.25, 0.85); 
                        colAttr.array[i3+2] = Math.min(0.2 + tExplo * 0.4, 1.0); 
                    }
                    posAttr.needsUpdate = true;
                    colAttr.needsUpdate = true;

                    if (galaxyMaterial.size < 4000) galaxyMaterial.size += 140.0;
                    galaxyMaterial.opacity = 0.4 + Math.sin(segs * 35) * 0.3;

                    if (segs > (duracaoTotal - 1.1)) {
                        overlay.style.backgroundColor = '#010105';
                        overlay.style.transition = 'opacity 1.0s linear';
                        overlay.style.opacity = Math.min((segs - (duracaoTotal - 1.1)) / 1.1, 1);
                    }
                }

                if (intensidadeTremor > 0) {
                    camera.position.x = cameraPosBase.x + (Math.random() - 0.5) * intensidadeTremor;
                    camera.position.y = cameraPosBase.y + (Math.random() - 0.5) * intensidadeTremor;
                    camera.position.z = cameraPosBase.z + (Math.random() - 0.5) * intensidadeTremor;
                    
                    controls.target.x = cameraTargetBase.x + (Math.random() - 0.5) * (intensidadeTremor * 0.25);
                    controls.target.y = cameraTargetBase.y + (Math.random() - 0.5) * (intensidadeTremor * 0.25);
                    controls.target.z = cameraTargetBase.z + (Math.random() - 0.5) * (intensidadeTremor * 0.25);
                }

            } else {
                sun.rotation.y += 0.0015;
                sun.rotation.x += 0.0005;
                galaxy.rotation.y += 0.00015;
                const pulse = 1 + Math.sin(tempo * 2) * 0.03;
                galaxy.scale.set(pulse, 1, pulse);

                for(let chave in meshesPlanetas) {
                    const p = meshesPlanetas[chave];
                    p.angle += p.speed;
                    p.group.position.x = Math.cos(p.angle) * p.dist;
                    p.group.position.z = Math.sin(p.angle) * p.dist;
                    p.mesh.rotation.y += 0.008;

                    p.group.getWorldPosition(posicoesGlobais[chave]);
                }
            }

            // Estrelas cadentes
            shootingStars.forEach(s => {
                s.mesh.position.x -= s.speed;
                s.mesh.position.z -= s.speed;
                if(s.mesh.position.x < -60000) {
                    s.mesh.position.set(Math.random()*40000, (Math.random()-0.5)*10000, Math.random()*40000);
                }
            });

            if(!explodindo) {
                moon.position.x = Math.cos(tempo * 2.5) * 16;
                moon.position.z = Math.sin(tempo * 2.5) * 16;
                moon.rotation.y += 0.005;
            } else {
                moon.position.lerp(new THREE.Vector3(0,0,0), 0.05);
            }

            nameSprite.lookAt(camera.position);

            const alvoCam = obterPosicaoFoco();
            if(!explodindo) {
                controls.target.lerp(alvoCam, 0.08);
                controls.update();
            } else {
                controls.update();
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const textos = {
            galaxy: { title: "Nossa Via-Láctea 🌌", body: "Olha que lindo tudo girando junto! No meio desse tanto de poeira e mistério, o universo caprichou na nossa história. Saber que você existe faz tudo parecer perfeito." },
            sun: { title: "O Sol: Nosso Combustível ☀️", body: "O Sol é a estrela que dá energia para todo o espaço. Ele é o combustível do que eu sinto por você: enquanto ele continuar brilhando forte, nosso amor vai ser eterno." },
            mercurio: { title: "Mercúrio", body: "Ele corre super rápido em volta do Sol. É igualzinho à velocidade que o meu coração bate toda vez que chega uma mensagem sua no meu celular!" },
            venus: { title: "Vênus", body: "O planeta mais brilhante do céu. Ele me lembra muito o brilho dos seus olhos quando a gente conversa e faz planos para o nosso futuro." },
            earth: { title: "Planeta Terra 🌍", body: "Existem bilhões de pessoas nesse mundo inteiro, mas foi com você que meu coração decidiu bater mais forte. É um milagre lindo a gente ter se encontrado no meio de tanta gente." },
            marte: { title: "Marte", body: "Marte é forte e cheio de cor. Ele me lembra a nossa força para fazer tudo dar certo e construir uma história linda passo a passo." },
            jupiter: { title: "Júpiter", body: "Júpiter é o maior planeta de todos, cabe tudo lá dentro! Mas sabia que ele ainda é pequeno perto do tamanho do futuro que eu imagino do seu lado?" },
            saturno: { title: "Saturno da Minha Maria ✨💍", body: "Esse é o planeta mais lindo do universo por causa desses anéis. Como ele é o meu preferido, coloquei o seu nome brilhando nele. Você é a dona do meu lugar favorito no espaço." },
            urano: { title: "Urano Azul-Piscina 💎", body: "Esse planeta de gelo tem a sua cor preferida! Ele é todo lindo, passa uma paz enorme só de olhar e me faz lembrar do quanto seu carinho me faz bem." },
            netuno: { title: "Netuno Roxo Cósmico 🔮", body: "Esse aqui tem a minha cor preferida. Viu como o meu planeta roxo e o seu planeta azul combinam perfeitamente juntos no espaço? Fomos feitos um para o outro." },
            plutao: { title: "Plutão 🤏", body: "Plutão é bem pequenininho e fica lá no cantinho dele kkkk. Olhei para ele e lembrei de você, minha baixinha! Mas o tamanho não importa, meu carinho por você é gigante!" }
        };

        animate();
    </script>
</body>
</html>
