<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Simulação Cosmológica Avançada</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #hud { position: absolute; top: 5%; width: 100%; text-align: center; color: #fff; z-index: 99; pointer-events: none; transition: 0.5s; }
    </style>
</head>
<body>
    <div id="hud">
        <h1 id="title">Nós</h1>
        <p id="msg">Em meio a bilhões, nos encontramos.</p>
    </div>
    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.01, 100000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 1. TERRA ALTA FIDELIDADE
        const earthGroup = new THREE.Group();
        const earth = new THREE.Mesh(
            new THREE.SphereGeometry(1, 128, 128),
            new THREE.MeshStandardMaterial({ 
                map: new THREE.TextureLoader().load('https://eoimages.gsfc.nasa.gov/images/imagerecords/73000/73909/world.topo.bathy.200407.3x5400x2700.jpg'),
                emissive: 0x112244, emissiveIntensity: 0.2 
            })
        );
        earthGroup.add(earth);
        scene.add(earthGroup);

        // 2. SISTEMA SOLAR (Simulação Orbital)
        const solarSystem = new THREE.Group();
        const planets = [
            { name: "Marte", dist: 8, color: 0xff4422, size: 0.4 },
            { name: "Júpiter", dist: 15, color: 0xffcc00, size: 0.9 },
            { name: "Saturno", dist: 25, color: 0xd2b48c, size: 0.7 }
        ];
        planets.forEach(p => {
            const mesh = new THREE.Mesh(new THREE.SphereGeometry(p.size, 64, 64), new THREE.MeshBasicMaterial({ color: p.color }));
            mesh.position.x = p.dist;
            solarSystem.add(mesh);
        });
        scene.add(solarSystem);

        // 3. VIA LÁCTEA (Sistema Dinâmico de Partículas)
        const starField = new THREE.BufferGeometry();
        const starCount = 50000;
        const posArray = new Float32Array(starCount * 3);
        for(let i=0; i<starCount * 3; i++) posArray[i] = (Math.random() - 0.5) * 20000;
        starField.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const stars = new THREE.Points(starField, new THREE.PointsMaterial({ size: 0.8, color: 0xffffff }));
        scene.add(stars);

        // 4. LÓGICA DE NAVEGAÇÃO DE PRECISÃO (Zoom "NASA")
        camera.position.z = 2;
        let currentZ = 2;
        window.addEventListener('wheel', (e) => {
            currentZ = Math.max(2, Math.min(currentZ + e.deltaY * 0.5, 15000));
            camera.position.z = currentZ;

            const t = document.getElementById('title');
            const m = document.getElementById('msg');
            if (currentZ < 50) { t.innerText = "Nós"; m.innerText = "Em meio a bilhões de pessoas, o nosso ponto de encontro."; }
            else if (currentZ < 1000) { t.innerText = "Sistema Solar"; m.innerText = "A imensidão do nosso sistema."; }
            else { t.innerText = "Via Láctea"; m.innerText = "O nosso amor atravessa galáxias."; }
        }, {passive: false});

        // 5. RENDERIZAÇÃO DE ALTA FREQUÊNCIA
        function animate() {
            requestAnimationFrame(animate);
            earth.rotation.y += 0.001;
            solarSystem.rotation.y += 0.0002;
            stars.rotation.y += 0.00005;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
