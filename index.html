<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nosso Universo</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Montserrat', sans-serif; overflow: hidden; }
        canvas { display: block; }
        #text-container {
            position: absolute; top: 50px; width: 100%; text-align: center;
            pointer-events: none; transition: opacity 1s;
        }
    </style>
</head>
<body>
    <div id="text-container">
        <h1 id="main-msg">Você é o meu mundo</h1>
        <p id="sub-msg">Role para descobrir o tamanho do meu amor</p>
    </div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let zoom = 1000;
        let targetZoom = 1000;

        function draw() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            zoom += (targetZoom - zoom) * 0.05;

            ctx.fillStyle = "#050505";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(canvas.width/2, canvas.height/2);
            ctx.scale(zoom/1000, zoom/1000);

            // 1. VIA LÁCTEA (Fundo)
            if (zoom < 800) {
                ctx.fillStyle = "rgba(255, 255, 255, 0.05)";
                ctx.beginPath(); ctx.arc(0, 0, 800, 0, Math.PI*2); ctx.fill();
            }

            // 2. SISTEMA SOLAR
            if (zoom < 2000) {
                // Órbitas
                ctx.strokeStyle = "rgba(255,255,255,0.1)";
                for(let i=1; i<5; i++) { ctx.beginPath(); ctx.arc(0, 0, i*150, 0, Math.PI*2); ctx.stroke(); }
                // Planetas
                drawPlanet(150, 'red', 8); drawPlanet(300, 'gold', 12); 
            }

            // 3. TERRA (O foco principal)
            const grad = ctx.createRadialGradient(-15, -15, 5, 0, 0, 50);
            grad.addColorStop(0, '#77aaff'); grad.addColorStop(1, '#002266');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(0, 0, 50, 0, Math.PI*2); ctx.fill();
            
            // "Pessoas" (Pontinhos de luz brilhando)
            ctx.fillStyle = "white";
            for(let i=0; i<200; i++) {
                let angle = i * 0.3;
                ctx.fillRect(Math.cos(angle)*45, Math.sin(angle)*45, 1, 1);
            }

            ctx.restore();

            // Lógica de Romantismo nas Mensagens
            const msg = document.getElementById('main-msg');
            const sub = document.getElementById('sub-msg');
            
            if (zoom > 800) { msg.innerText = "Você é o meu mundo"; sub.innerText = "Em meio a bilhões de pessoas, você é a única."; }
            else if (zoom > 300) { msg.innerText = "Nosso Sistema Solar"; sub.innerText = "Mas nada brilha mais que o nosso encontro."; }
            else { msg.innerText = "Infinito"; sub.innerText = "Meu amor por você atravessa galáxias."; }
            
            document.getElementById('text-container').style.opacity = zoom < 200 ? 0.3 : 1;

            requestAnimationFrame(draw);
        }

        function drawPlanet(dist, color, size) {
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.arc(dist, 0, size, 0, Math.PI*2); ctx.fill();
        }

        window.addEventListener('wheel', (e) => {
            targetZoom = Math.max(50, Math.min(targetZoom - e.deltaY * 2, 3000));
        });

        draw();
    </script>
</body>
</html>
