<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nossa Jornada</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #overlay { position: absolute; top: 10%; width: 100%; text-align: center; transition: opacity 2s; pointer-events: none; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 id="titulo">Nós</h1>
    <p id="sub">Em meio a bilhões, nos encontramos.</p>
</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 1. Camada Terra com "Pessoas" (Pontos brilhantes na superfície)
    const earth = new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), new THREE.MeshBasicMaterial({ color: 0x2244ff }));
    scene.add(earth);
    
    // Milhares de pontos na superfície representando pessoas
    const peopleGeo = new THREE.BufferGeometry();
    const pCoords = [];
    for(let i=0; i<5000; i++) {
        const phi = Math.acos(-1 + (2 * i) / 5000);
        const theta = Math.sqrt(5000 * Math.PI) * phi;
        pCoords.push(Math.cos(theta)*Math.sin(phi)*1.01, Math.sin(theta)*Math.sin(phi)*1.01, Math.cos(phi)*1.01);
    }
    peopleGeo.setAttribute('position', new THREE.Float32BufferAttribute(pCoords, 3));
    const people = new THREE.Points(peopleGeo, new THREE.PointsMaterial({ size: 0.01, color: 0xffff00 }));
    earth.add(people);

    // 2. Sistema Solar
    const planets = new THREE.Group();
    for(let i=0; i<8; i++) {
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.2, 32, 32), new THREE.MeshBasicMaterial({ color: Math.random()*0xffffff }));
        mesh.position.x = 5 + (i * 2);
        planets.add(mesh);
    }
    scene.add(planets);

    // 3. Via Láctea (Fundo denso)
    const galaxy = new THREE.Points(new THREE.BufferGeometry(), new THREE.PointsMaterial({ size: 2 }));
    const gCoords = [];
    for(let i=0; i<20000; i++) {
        gCoords.push((Math.random()-0.5)*1000, (Math.random()-0.5)*1000, (Math.random()-0.5)*1000);
    }
    galaxy.geometry.setAttribute('position', new THREE.Float32BufferAttribute(gCoords, 3));
    scene.add(galaxy);

    camera.position.z = 2; // Começa na Terra

    window.addEventListener('wheel', (e) => {
        camera.position.z += e.deltaY * 0.1;
        camera.position.z = Math.max(2, Math.min(camera.position.z, 2000));
        
        // Atualizar mensagens conforme zoom
        const z = camera.position.z;
        const tit = document.getElementById('titulo');
        const sub = document.getElementById('sub');
        
        if (z < 10) { tit.innerText = "Nós dois"; sub.innerText = "Milhões de pessoas, mas eu só vejo você."; }
        else if (z < 100) { tit.innerText = "Nosso Sistema Solar"; sub.innerText = "Tão pequenos, mas tão imensos um para o outro."; }
        else { tit.innerText = "Via Láctea"; sub.innerText = "Nada é mais vasto que o que sentimos."; }
    });

    function animate() {
        requestAnimationFrame(animate);
        earth.rotation.y += 0.005;
        planets.rotation.y += 0.002;
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
