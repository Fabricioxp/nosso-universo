<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nossa Jornada</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Georgia', serif; }
        #ui { position: absolute; bottom: 10%; width: 100%; text-align: center; color: white; pointer-events: none; padding: 0 20px; text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>

<div id="ui">
    <h1 id="titulo">Nós</h1>
    <p id="sub">Em meio a bilhões de pessoas, nos encontramos.</p>
</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 50000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // 1. TERRA REALISTA
    const texLoader = new THREE.TextureLoader();
    const earthTex = texLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg');
    const earth = new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), new THREE.MeshBasicMaterial({ map: earthTex }));
    scene.add(earth);

    // 2. SISTEMA SOLAR (Planetas reais visualmente distintos)
    const sun = new THREE.Mesh(new THREE.SphereGeometry(2, 32, 32), new THREE.MeshBasicMaterial({ color: 0xffcc00 }));
    sun.position.set(10, 0, 0); scene.add(sun);
    
    const mars = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), new THREE.MeshBasicMaterial({ color: 0xff4422 }));
    mars.position.set(15, 0, 0); scene.add(mars);

    // 3. VIA LÁCTEA (Background de alta densidade)
    const galaxy = new THREE.Mesh(
        new THREE.SphereGeometry(100, 64, 64),
        new THREE.MeshBasicMaterial({ map: texLoader.load('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=2000'), side: THREE.BackSide })
    );
    scene.add(galaxy);

    camera.position.z = 3;
    let zPos = 3;

    window.addEventListener('wheel', (e) => {
        zPos = Math.min(Math.max(zPos + e.deltaY * 0.2, 3), 300);
        camera.position.z = zPos;

        // Lógica de Mensagens Narrativas
        const tit = document.getElementById('titulo');
        const sub = document.getElementById('sub');
        
        if (zPos < 20) { tit.innerText = "Nós"; sub.innerText = "Em meio a bilhões, nos encontramos."; }
        else if (zPos < 100) { tit.innerText = "O Sistema Solar"; sub.innerText = "Mas o tamanho deles não se compara ao que sinto."; }
        else { tit.innerText = "A Imensidão"; sub.innerText = "O Universo inteiro é pequeno perto de nós dois."; }
    }, {passive: false});

    function animate() {
        requestAnimationFrame(animate);
        earth.rotation.y += 0.005;
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
