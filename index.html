<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Universo da Maria</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #010105; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        /* Tela de Introdução */
        #intro { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #11091c 0%, #010105 100%); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; transition: opacity 1.5s ease-in-out; opacity: 1; }
        #intro h1 { font-size: 3.2rem; margin-bottom: 15px; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; background: linear-gradient(45deg, #ff6b8b, #ff8e53); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #intro p { font-size: 1.1rem; max-width: 500px; color: #cbbad6; margin-bottom: 35px; line-height: 1.6; padding: 0 20px; font-weight: 300; }
        #btn-start { padding: 15px 45px; font-size: 1rem; color: #fff; background: linear-gradient(45deg, rgba(255,107,139,0.4), rgba(255,142,83,0.4)); border: 1px solid rgba(255,255,255,0.3); border-radius: 50px; cursor: pointer; backdrop-filter: blur(10px); transition: all 0.4s; letter-spacing: 2px; text-transform: uppercase; }
        #btn-start:hover { background: #fff; color: #ff6b8b; box-shadow: 0 0 30px rgba(255,107,139,0.6); border-color: #fff; transform: scale(1.03); }

        /* HUD Pequeno e Delicado */
        #hud { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 480px; text-align: center; color: white; z-index: 10; pointer-events: none; opacity: 0; transition: opacity 0.8s, transform 0.8s; background: rgba(6, 3, 11, 0.75); padding: 15px 25px; border-radius: 16px; border: 1px solid rgba(255, 107, 139, 0.25); box-shadow: 0 10px 30px rgba(0,0,0,0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        #msg-title { font-size: 1.4rem; font-weight: 600; margin: 0 0 6px 0; color: #ff9ebb; text-shadow: 0 2px 10px rgba(255,107,139,0.4); }
        #msg-body { font-size: 0.95rem; margin: 0; color: #e5def0; font-weight: 400; line-height: 1.5; }

        /* Menu de Navegação Otimizado */
        #nav-container { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 20; display: flex; flex-direction: column; align-items: center; gap: 8px; width: 90%; max-width: 750px; }
        #nav-menu { display: flex; gap: 6px; background: rgba(5, 3, 10, 0.6); padding: 6px 12px; border-radius: 30px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); flex-wrap: wrap; justify-content: center; transition: all 0.4s ease; max-height: 200px; overflow: hidden; }
        #nav-menu.hidden { max-height: 0; padding: 0; border: none; opacity: 0; pointer-events: none; }
        
        .nav-btn { background: transparent; border: none; color: #b5a9c0; padding: 6px 12px; border-radius: 15px; cursor: pointer; font-size: 0.82rem; transition: all 0.2s; font-weight: 500; }
        .nav-btn:hover { color: #fff; background: rgba(255, 107, 139, 0.2); }
        /* Estado Ativo e Estado Lido (Verde) */
        .nav-btn.active { color: #fff; text-shadow: 0 0 5px #fff; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2); }
        .nav-btn.visto { color: #2ecc71 !important; text-shadow: 0 0 8px rgba(46, 204, 113, 0.6); }
        .nav-btn.align-btn { background: linear-gradient(45deg, #ff6b8b, #ff8e53); color: white; font-weight: bold; }
        
        /* Controles de Topo */
        .top-controls { display: flex; gap: 10px; }
        .top-btn { background: rgba(255, 107, 139, 0.2); border: 1px solid rgba(255, 107, 139, 0.4); color: #ff9ebb; padding: 4px 14px; border-radius: 20px; cursor: pointer; font-size: 0.75rem; font-weight: 600; letter-spacing: 1px; backdrop-filter: blur(5px); transition: all 0.3s; }
        .top-btn:hover { background: rgba(255, 107, 139, 0.4); color: #fff; }

        /* Botão do Grand Finale (Big Bang) */
        #btn-finale { position: fixed; top: 53%; left: 50%; transform: translate(-50%, -50%) scale(0.9); z-index: 500; padding: 18px 35px; font-size: 1.1rem; color: #fff; background: linear-gradient(45deg, #2ecc71, #1abc9c); border: 2px solid rgba(255,255,255,0.6); border-radius: 50px; cursor: pointer; font-weight: bold; letter-spacing: 1px; box-shadow: 0 0 30px rgba(46,204,113,0.6); transition: all 0.5s ease-in-out; opacity: 0; pointer-events: none; }
        #btn-finale.show { opacity: 1; pointer-events: auto; transform: translate(-50%, -50%) scale(1); animation: pulsarBotao 2s infinite alternate; }
        @keyframes pulsarBotao { from { box-shadow: 0 0 20px rgba(46,204,113,0.5); } to { box-shadow: 0 0 40px rgba(26,188,156,0.9), 0 0 10px #fff; } }

        /* Cortina de transição escura para reset */
        #fade-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: #010105; z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 2s ease-in-out; }
    </style>
</head>
<body>

    <div id="fade-overlay"></div>

    <audio id="musica-fundo" loop>
        <source src="principal.mp3" type="audio/mpeg">
    </audio>

    <div id="intro">
        <h1>O Universo de Nós Dois</h1>
        <p>Um espaço inteirinho criado para te mostrar que você mudou completamente a minha vida. Você é o meu mundo.</p>
        <button id="btn-start" onclick="iniciar()">Iniciar Passeio</button>
    </div>

    <button id="btn-finale" onclick="dispararExplosao()">💥 Ativar o Big Bang do Nosso Amor</button>

    <div id="nav-container">
        <div class="top-controls">
            <button id="toggle-menu" class="top-btn" onclick="AlternarMenu()">Esconder Painel 👁️</button>
            <button id="toggle-audio" class="top-btn" onclick="AlternarAudio()">Pausar Música ⏸️</button>
        </div>
        <div id="nav-menu">
            <button class="nav-btn" data-id="galaxy" onclick="mudarFoco('galaxy')">🌌 Via-Láctea</button>
            <button class="nav-btn" data-id="sun" onclick="mudarFoco('sun')">☀️ Sol</button>
            <button class="nav-btn" data-id="mercurio" onclick="mudarFoco('mercurio')">Mercúrio</button>
            <button class="nav-btn" data-id="venus" onclick="mudarFoco('venus')">Vênus</button>
            <button class="nav-btn active" data-id="earth" onclick="mudarFoco('earth')">🌍 Terra</button>
            <button class="nav-btn" data-id="marte" onclick="mudarFoco('marte')">Marte</button>
            <button class="nav-btn" data-id="jupiter" onclick="mudarFoco('jupiter')">Júpiter</button>
            <button class="nav-btn" data-id="saturno" onclick="mudarFoco('saturno')">🪐 Maria (Saturno)</button>
            <button class="nav-btn" data-id="urano" onclick="mudarFoco('urano')">Urano</button>
            <button class="nav-btn" data-id="netuno" onclick="mudarFoco('netuno')">Netuno</button>
            <button class="nav-btn" data-id="plutao" onclick="mudarFoco('plutao')">Plutão</button>
            <button class="nav-btn align-btn" onclick="alinharCamera()">✨ Focar de Perto</button>
        </div>
    </div>
    
    <div id="hud">
        <h2 id="msg-title">Calculando órbitas...</h2>
        <p id="msg-body">Alinhando estrelas para a Maria.</p>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        // 1. MOTOR DO ESPAÇO
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const loader = new THREE.TextureLoader();
        let focoAtual = 'earth';
        let explodindo = false;
        let velExplosao = 0;
        
        // Controle de Planetas Vistos
        const planetasParaVerificar = ['galaxy', 'sun', 'mercurio', 'venus', 'earth', 'marte', 'jupiter', 'saturno', 'urano', 'netuno', 'plutao'];
        let planetasVistos = new Set();

        const posicoesGlobais = { 
            sun: new THREE.Vector3(20000, 0, 0),
            galaxy: new THREE.Vector3(0, 4000, 0)
        };

        // 2. VIA LÁCTEA
        const galaxyGeometry = new THREE.BufferGeometry();
        const gPoints = 170000;
        const gPositions = new Float32Array(gPoints * 3);
        const gColors = new Float32Array(gPoints * 3);
        
        const colCore = new THREE.Color('#ff7ea5'); 
        const colArm = new THREE.Color('#4c3b99');  

        for(let i = 0; i < gPoints; i++) {
            const i3 = i * 3;
            const r = Math.pow(Math.random(), 2.5) * 65000; 
            const arms = 4;
            const theta = ((i % arms) / arms) * Math.PI * 2 + (r * 0.00006); 

            const spread = Math.pow(Math.random(), 2) * (Math.random() < 0.5 ? 1 : -1) * r * 0.12;
            const ySpread = (Math.random() - 0.5) * (65000 - r) * 0.04;

            gPositions[i3] = Math.cos(theta) * r + spread;
            gPositions[i3+1] = ySpread;
            gPositions[i3+2] = Math.sin(theta) * r + (Math.random() - 0.5) * r * 0.12;

            const finalCol = colCore.clone().lerp(colArm, r / 65000);
            if(Math.random() > 0.96) finalCol.addScalar(0.4); 
            
            gColors[i3] = finalCol.r;
            gColors[i3+1] = finalCol.g;
            gColors[i3+2] = finalCol.b;
        }
        galaxyGeometry.setAttribute('position', new THREE.BufferAttribute(gPositions, 3));
        galaxyGeometry.setAttribute('color', new THREE.BufferAttribute(gColors, 3));

        const pCanvas = document.createElement('canvas'); pCanvas.width = 16; pCanvas.height = 16;
        const gCtx = pCanvas.getContext('2d');
        const grad = gCtx.createRadialGradient(8,8,0, 8,8,8);
        grad.addColorStop(0, 'rgba(255,255,255,1)'); grad.addColorStop(1, 'rgba(255,255,255,0)');
        gCtx.fillStyle = grad; gCtx.fillRect(0,0,16,16);

        const galaxyMaterial = new THREE.PointsMaterial({
            size: 110, sizeAttenuation: true, depthWrite: false,
            blending: THREE.AdditiveBlending, vertexColors: true,
            transparent: true, map: new THREE.CanvasTexture(pCanvas), opacity: 0.85
        });
        const galaxy = new THREE.Points(galaxyGeometry, galaxyMaterial);
        scene.add(galaxy);

        // Estrelas cadentes
        const lineMat = new THREE.LineBasicMaterial({ color: 0xff758c, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });
        const shootingStars = [];
        for(let i=0; i<4; i++) {
            const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(-300, -150, -300)]);
            const line = new THREE.Line(lineGeo, lineMat);
            line.position.set((Math.random()-0.5)*40000, (Math.random()-0.5)*10000, (Math.random()-0.5)*40000);
            scene.add(line);
            shootingStars.push({ mesh: line, speed: 20 + Math.random()*20 });
        }

        // 3. SISTEMA SOLAR
        const solarSystem = new THREE.Group();
        solarSystem.position.set(20000, 0, 0);
        scene.add(solarSystem);

        scene.add(new THREE.AmbientLight(0x443a5e));
        const sunLight = new THREE.PointLight(0xfff5ea, 3, 80000);
        solarSystem.add(sunLight);

        // O SOL
        const sun = new THREE.Mesh(new THREE.SphereGeometry(35, 64, 64), new THREE.MeshBasicMaterial({ color: 0xffa033 }));
        const sunGlow = new THREE.Mesh(new THREE.SphereGeometry(39, 32, 32), new THREE.MeshBasicMaterial({ color: 0xff5500, transparent: true, opacity: 0.3, side: THREE.BackSide }));
        sun.add(sunGlow);
        solarSystem.add(sun);

        // 4. TERRA E LUA ROCHOSA
        const earthGroup = new THREE.Group();
        const earthMat = new THREE.MeshStandardMaterial({ color: 0x2b82c9, roughness: 0.4 });
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg', (tex) => {
            earthMat.map = tex; earthMat.color.setHex(0xffffff); earthMat.needsUpdate = true;
        });

        const earth = new THREE.Mesh(new THREE.SphereGeometry(7.5, 64, 64), earthMat);
        earthGroup.add(earth);

        const luaGeo = new THREE.SphereGeometry(2.0, 48, 48); 
        const luaMat = new THREE.MeshStandardMaterial({ color: 0xff4b72, roughness: 0.9, metalness: 0.0 });
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/moon_1024.jpg', (tex) => {
            luaMat.bumpMap = tex; luaMat.bumpScale = 0.08; luaMat.needsUpdate = true;
        });

        const moon = new THREE.Mesh(luaGeo, luaMat);
        moon.position.set(22, 2, 0);
        earthGroup.add(moon);
        solarSystem.add(earthGroup);

        // 5. SATURNO COM O NOME "MARIA"
        const saturnoGroup = new THREE.Group();
        const saturnoMesh = new THREE.Mesh(new THREE.SphereGeometry(13.5, 64, 64), new THREE.MeshStandardMaterial({ color: 0xe2bf7d, roughness: 0.5 }));
        saturnoGroup.add(saturnoMesh);

        const rGeo = new THREE.RingGeometry(16, 30, 64);
        const rMat = new THREE.MeshStandardMaterial({ color: 0xd2af6d, side: THREE.DoubleSide, transparent: true, opacity: 0.75 });
        const rMesh = new THREE.Mesh(rGeo, rMat); rMesh.rotation.x = Math.PI/2.2;
        saturnoGroup.add(rMesh);

        const nameCanvas = document.createElement('canvas'); nameCanvas.width = 512; nameCanvas.height = 128;
        const nCtx = nameCanvas.getContext('2d');
        nCtx.fillStyle = 'rgba(0,0,0,0)'; nCtx.fillRect(0,0,512,128);
        nCtx.font = 'Bold 60px sans-serif'; nCtx.fillStyle = '#ff9ebb'; nCtx.textAlign = 'center';
        nCtx.shadowColor = '#ff3366'; nCtx.shadowBlur = 15;
        nCtx.fillText('❤️ MARIA ❤️', 256, 80);
        
        const nameTex = new THREE.CanvasTexture(nameCanvas);
        const nameSpriteMat = new THREE.SpriteMaterial({ map: nameTex, transparent: true });
        const nameSprite = new THREE.Sprite(nameSpriteMat);
        nameSprite.position.set(0, 22, 0); 
        nameSprite.scale.set(35, 9, 1);
        saturnoGroup.add(nameSprite);
        solarSystem.add(saturnoGroup);

        // 6. PLANETAS
        const infoPlanetas = [
            { name: 'mercurio', size: 2.5, dist: 60, color: 0x999999, speed: 0.004 },
            { name: 'venus', size: 5.8, dist: 95, color: 0xe3bb87, speed: 0.003 },
            { name: 'marte', size: 4.0, dist: 195, color: 0xc1440e, speed: 0.0016 },
            { name: 'jupiter', size: 17.5, dist: 260, color: 0xd4a373, speed: 0.001 },
            { name: 'urano', size: 9.0, dist: 420, color: 0x3ae5d9, speed: 0.0005 },
            { name: 'netuno', size: 8.5, dist: 500, color: 0x7832cc, speed: 0.0003 },
            { name: 'plutao', size: 1.5, dist: 560, color: 0x8a7b68, speed: 0.0002 }
        ];

        const meshesPlanetas = {};
        infoPlanetas.forEach(p => {
            const grupo = new THREE.Group();
            const mesh = new THREE.Mesh(new THREE.SphereGeometry(p.size, 48, 48), new THREE.MeshStandardMaterial({ color: p.color, roughness: 0.7 }));
            grupo.add(mesh);
            solarSystem.add(grupo);
            meshesPlanetas[p.name] = { group: grupo, mesh: mesh, dist: p.dist, angle: Math.random()*10, speed: p.speed };
        });

        meshesPlanetas['earth'] = { group: earthGroup, mesh: earth, dist: 145, angle: 1, speed: 0.002 };
        meshesPlanetas['saturno'] = { group: saturnoGroup, mesh: saturnoMesh, dist: 340, angle: 5, speed: 0.0008 };

        // 7. TEXTOS
        const textos = {
            galaxy: { title: "Nossa Via-Láctea 🌌", body: "Olha que lindo tudo girando junto! No meio desse tanto de poeira e mistério, o universo caprichou na nossa história. Saber que você existe faz tudo parecer perfeito." },
            sun: { title: "O Sol: Nosso Combustível ☀️", body: "O Sol é a estrella que dá energia para todo o espaço. Ele é o combustível do que eu sinto por você: enquanto ele continuar brilhando forte, nosso amor vai ser eterno." },
            mercurio: { title: "Mercúrio", body: "Ele corre super rápido em volta do Sol. É igualzinho à velocidade que o meu coração bate toda vez que chega uma mensagem sua no meu celular!" },
            venus: { title: "Vênus", body: "O planeta mais brilhante do céu. Ele me lembra muito o brilho dos seus olhos quando a gente conversa e faz planos para o nosso futuro." },
            earth: { title: "Planeta Terra 🌍", body: "Existem bilhões de pessoas nesse mundo inteiro, mas foi com você que meu coração decidiu bater mais forte. É um milagre lindo a gente ter se encontrado no meio de tanta gente." },
            marte: { title: "Marte", body: "Marte é forte e cheio de cor. Ele me lembra a nossa força para fazer tudo dar certo e construir uma história linda passo a passo." },
            jupiter: { title: "Júpiter", body: "Júpiter é o maior planeta de todos, cabe tudo lá dentro! Mas sabia que ele ainda é pequeno perto do tamanho do futuro que eu imagino do seu lado?" },
            saturno: { title: "Saturno da Minha Maria ✨💍", body: "Esse é o planeta mais lindo do universo por causa desses anéis. Como ele é o meu preferido, coloquei o seu nome brilhando nele. Você é a dona do meu lugar favorito no espaço." },
            urano: { title: "Urano Azul-Piscina 💎", body: "Esse planeta de gelo tem a sua cor preferida! Ele é todo lindo, passa uma paz enorme só de olhar e me faz lembrar do quanto seu carinho me faz bem." },
            netuno: { title: "Netuno Roxo Cósmico 🔮", body: "Esse aqui tem a minha cor preferida. Viu como o meu planeta roxo e o seu planeta azul combinam perfeitamente juntos no espaço? Fomos feitos um para o outro." },
            plutao: { title: "Plutão 🤏", body: "Plutão é bem pequenininho e fica lá no cantinho dele kkkk. Olhei para ele e lembrei de você, minha baixinha! Mas o tamanho não importa, meu carinho por você é gigante!" }
        };

        // CONTROLES
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05;
        controls.minDistance = 10; controls.maxDistance = 150000;

        camera.position.set(20140, 15, 25);
        controls.target.set(20140, 0, 0);

        const uiTitle = document.getElementById('msg-title');
        const uiBody = document.getElementById('msg-body');
        const audioTag = document.getElementById('musica-fundo');

        window.iniciar = () => {
            document.getElementById('intro').style.opacity = '0';
            
            audioTag.volume = 0.3; 
            audioTag.play().catch(e => console.log("O áudio precisou de clique:", e));

            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('hud').style.opacity = '1';
                mudarFoco('earth');
            }, 1500);
        };

        window.mudarFoco = (alvo) => {
            if(explodindo) return;
            focoAtual = alvo;
            
            // Gerencia botões lidos (Verdes)
            planetasVistos.add(alvo);
            const btnLido = document.querySelector(`.nav-btn[data-id="${alvo}"]`);
            if(btnLido) btnLido.classList.add('visto');

            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(btnLido) btnLido.classList.add('active');

            if(textos[alvo]) {
                uiTitle.innerText = textos[alvo].title;
                uiBody.innerText = textos[alvo].body;
            }

            if(alvo === 'galaxy') {
                camera.position.set(0, 55000, 65000);
                controls.target.set(0, 0, 0);
            }

            // Verifica se viu TODOS para liberar o Grand Finale
            if (planetasParaVerificar.every(p => planetasVistos.has(p))) {
                document.getElementById('btn-finale').classList.add('show');
            }
        };

        window.alinharCamera = () => {
            if(explodindo) return;
            if(focoAtual === 'galaxy') {
                camera.position.set(0, 55000, 65000);
                controls.target.set(0, 0, 0);
                return;
            }
            const p = obterPosicaoFoco();
            const offset = (focoAtual === 'sun' || focoAtual === 'saturno') ? 65 : 25;
            camera.position.set(p.x + offset, p.y + 10, p.z + offset);
            controls.target.copy(p);
            controls.update();
        };

        window.AlternarMenu = () => {
            const menu = document.getElementById('nav-menu');
            const btn = document.getElementById('toggle-menu');
            if(menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
                btn.innerText = "Esconder Painel 👁️";
            } else {
                menu.classList.add('hidden');
                btn.innerText = "Mostrar Planetas 🪐";
            }
        };

        window.AlternarAudio = () => {
            const btn = document.getElementById('toggle-audio');
            if (audioTag.paused) {
                audioTag.play();
                btn.innerText = "Pausar Música ⏸️";
            } else {
                audioTag.pause();
                btn.innerText = "Tocar Música ▶️";
            }
        };

        // EXCLUSIVO DO GRAND FINALE: DISPARAR O BIG BANG LENTO
        window.dispararExplosao = () => {
            explodindo = true;
            velExplosao = 1; // Ativa a expansão
            document.getElementById('btn-finale').classList.remove('show');
            document.getElementById('nav-container').style.display = 'none';
            
            uiTitle.innerText = "💥 O Big Bang do Nosso Amor...";
            uiBody.innerText = "Tudo o que criamos se expande lentamente pelo infinito. O que eu sinto por você reconstrói galáxias inteiras.";

            // Visão panorâmica de cinema bem lenta
            camera.position.set(20000, 45000, 95000);
            controls.target.set(20000, 0, 0);

            // Transição suave para reiniciar após a Maria apreciar cada detalhe por 9 segundos
            setTimeout(() => {
                const overlay = document.getElementById('fade-overlay');
                overlay.style.pointerEvents = 'auto';
                overlay.style.opacity = '1';

                setTimeout(() => {
                    // CORTA A MÚSICA TOTALMENTE E RESETA O PROJETO
                    audioTag.pause();
                    audioTag.currentTime = 0;
                    document.getElementById('toggle-audio').innerText = "Pausar Música ⏸️";

                    // Restaura posições e variáveis
                    explodindo = false;
                    velExplosao = 0;
                    planetasVistos.clear();
                    
                    // Reseta cores dos botões de navegação
                    document.querySelectorAll('.nav-menu, .nav-btn').forEach(btn => {
                        btn.classList.remove('visto');
                        btn.classList.remove('active');
                    });
                    document.querySelector('.nav-btn[data-id="earth"]').classList.add('active');

                    // Posiciona os planetas de volta no lugar
                    solarSystem.position.set(20000, 0, 0);
                    for(let chave in meshesPlanetas) {
                        const p = meshesPlanetas[chave];
                        p.group.position.set(0, 0, 0);
                    }

                    // Prepara tela inicial de novo
                    document.getElementById('nav-container').style.display = 'flex';
                    const intro = document.getElementById('intro');
                    intro.style.display = 'flex';
                    intro.style.opacity = '1';
                    document.getElementById('hud').style.opacity = '0';

                    camera.position.set(20140, 15, 25);
                    controls.target.set(20140, 0, 0);

                    // Remove a cortina escura de transição
                    overlay.style.opacity = '0';
                    overlay.style.pointerEvents = 'none';
                }, 2000);

            }, 9000);
        };

        function obterPosicaoFoco() {
            if(focoAtual === 'galaxy') return new THREE.Vector3(0,0,0);
            if(focoAtual === 'sun') return solarSystem.position;
            const p = posicoesGlobais[focoAtual];
            return p ? p : solarSystem.position;
        }

        // 8. LOOP DE ANIMAÇÃO DO ESPAÇO
        function animate() {
            requestAnimationFrame(animate);

            const tempo = Date.now() * 0.0005;

            // Se o Grand Finale estiver ativado, expande tudo para longe em câmera lenta
            if (explodindo) {
                velExplosao += 0.4;
                
                // Os planetas se afastam radialmente em câmera lenta do Sol
                for(let chave in meshesPlanetas) {
                    const p = meshesPlanetas[chave];
                    p.group.position.x += Math.cos(p.angle) * velExplosao * 0.15;
                    p.group.position.z += Math.sin(p.angle) * velExplosao * 0.15;
                }
                
                // O Sol e o sistema inteiro se afastam do centro da Via-Láctea
                solarSystem.position.x += velExplosao * 0.1;
                
                // As partículas da galáxia se dispersam lentamente
                galaxy.rotation.y += 0.003;
                galaxy.scale.addScalar(0.002);
            } else {
                // Movimento orbital normal se não estiver explodindo
                sun.rotation.y += 0.001;
                galaxy.rotation.y += 0.00015;
                const pulse = 1 + Math.sin(tempo * 2) * 0.03;
                galaxy.scale.set(pulse, 1, pulse);

                for(let chave in meshesPlanetas) {
                    const p = meshesPlanetas[chave];
                    p.angle += p.speed;
                    p.group.position.x = Math.cos(p.angle) * p.dist;
                    p.group.position.z = Math.sin(p.angle) * p.dist;
                    p.mesh.rotation.y += 0.008;

                    if(!posicoesGlobais[chave]) posicoesGlobais[chave] = new THREE.Vector3();
                    p.group.getWorldPosition(posicoesGlobais[chave]);
                }
            }

            // Estrelas cadentes normais
            shootingStars.forEach(s => {
                s.mesh.position.x -= s.speed;
                s.mesh.position.z -= s.speed;
                if(s.mesh.position.x < -60000) {
                    s.mesh.position.set(Math.random()*40000, (Math.random()-0.5)*10000, Math.random()*40000);
                }
            });

            // Movimento da lua
            moon.position.x = Math.cos(tempo * 2.5) * 16;
            moon.position.z = Math.sin(tempo * 2.5) * 16;
            moon.rotation.y += 0.005;

            nameSprite.lookAt(camera.position);

            const alvoCam = obterPosicaoFoco();
            if(focoAtual !== 'galaxy' && !explodindo) {
                controls.target.lerp(alvoCam, 0.08);
            } else if (!explodindo) {
                controls.target.lerp(new THREE.Vector3(0,0,0), 0.05);
            }

            if(focoAtual !== 'galaxy' && camera.position.distanceTo(alvoCam) > 3000 && !explodindo) {
                uiTitle.innerText = textos.galaxy.title;
                uiBody.innerText = textos.galaxy.body;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
