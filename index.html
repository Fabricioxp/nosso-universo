<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nossa História no Universo</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Arial', sans-serif; }
        #ui { position: absolute; bottom: 10%; width: 100%; text-align: center; color: white; pointer-events: none; transition: 1s; padding: 0 20px; }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="ui">
    <h2 id="msg">Você é o meu universo.</h2>
    <p id="sub">Role para afastar o zoom e sentir a imensidão do que temos.</p>
</div>

<script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 2000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Terra
    const earthGeom = new THREE.SphereGeometry(1, 32, 32);
    const earthMat = new THREE.MeshBasicMaterial({ color: 0x2277ff, wireframe: true });
    const earth = new THREE.Mesh(earthGeom, earthMat);
    scene.add(earth);

    // Sistema Solar (Pontos de luz)
    const stars = new THREE.Points(
        new THREE.BufferGeometry().setAttribute('position', new THREE.Float32BufferAttribute(new Float32Array(3000), 3)),
        new THREE.PointsMaterial({ size: 0.1, color: 0xffffff })
    );
    scene.add(stars);

    camera.position.z = 5;

    let zoom = 5;
    window.addEventListener('wheel', (e) => {
        zoom = Math.min(Math.max(zoom + e.deltaY * 0.01, 2), 50);
        camera.position.z = zoom;
    });

    function animate() {
        requestAnimationFrame(animate);
        earth.rotation.y += 0.005;
        
        // Mudança de mensagem conforme o zoom
        const msg = document.getElementById('msg');
        if (zoom < 10) { msg.innerText = "Em meio a bilhões de pessoas, você é a única."; }
        else if (zoom < 30) { msg.innerText = "Tão pequenos no sistema solar..."; }
        else { msg.innerText = "E mesmo assim, o universo inteiro conspira a nosso favor."; }
        
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
