<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Universo da Maria</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #010105; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        /* Tela de Introdução */
        #intro { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #11091c 0%, #010105 100%); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; transition: opacity 1.5s ease-in-out; }
        #intro h1 { font-size: 3.2rem; margin-bottom: 15px; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; background: linear-gradient(45deg, #ff6b8b, #ff8e53); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #intro p { font-size: 1.1rem; max-width: 500px; color: #cbbad6; margin-bottom: 35px; line-height: 1.6; padding: 0 20px; font-weight: 300; }
        #btn-start { padding: 15px 45px; font-size: 1rem; color: #fff; background: linear-gradient(45deg, rgba(255,107,139,0.4), rgba(255,142,83,0.4)); border: 1px solid rgba(255,255,255,0.3); border-radius: 50px; cursor: pointer; backdrop-filter: blur(10px); transition: all 0.4s; letter-spacing: 2px; text-transform: uppercase; }
        #btn-start:hover { background: #fff; color: #ff6b8b; box-shadow: 0 0 30px rgba(255,107,139,0.6); border-color: #fff; transform: scale(1.03); }

        /* HUD Pequeno e Delicado */
        #hud { position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 480px; text-align: center; color: white; z-index: 10; pointer-events: none; opacity: 0; transition: opacity 0.8s, transform 0.8s; background: rgba(6, 3, 11, 0.75); padding: 15px 25px; border-radius: 16px; border: 1px solid rgba(255, 107, 139, 0.25); box-shadow: 0 10px 30px rgba(0,0,0,0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        #msg-title { font-size: 1.4rem; font-weight: 600; margin: 0 0 6px 0; color: #ff9ebb; text-shadow: 0 2px 10px rgba(255,107,139,0.4); }
        #msg-body { font-size: 0.95rem; margin: 0; color: #e5def0; font-weight: 400; line-height: 1.5; }

        /* Menu de Navegação Otimizado */
        #nav-container { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 20; display: flex; flex-direction: column; align-items: center; gap: 8px; width: 90%; max-width: 700px; }
        #nav-menu { display: flex; gap: 6px; background: rgba(5, 3, 10, 0.6); padding: 6px 12px; border-radius: 30px; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); flex-wrap: wrap; justify-content: center; transition: all 0.4s ease; max-height: 200px; overflow: hidden; }
        #nav-menu.hidden { max-height: 0; padding: 0; border: none; opacity: 0; pointer-events: none; }
        
        .nav-btn { background: transparent; border: none; color: #b5a9c0; padding: 6px 12px; border-radius: 15px; cursor: pointer; font-size: 0.82rem; transition: all 0.2s; font-weight: 500; }
        .nav-btn:hover, .nav-btn.active { color: #fff; background: rgba(255, 107, 139, 0.35); text-shadow: 0 0 5px #fff; }
        .nav-btn.align-btn { background: linear-gradient(45deg, #ff6b8b, #ff8e53); color: white; font-weight: bold; }
        
        /* Botão Lindo de Esconder/Mostrar */
        #toggle-menu { background: rgba(255, 107, 139, 0.2); border: 1px solid rgba(255, 107, 139, 0.4); color: #ff9ebb; padding: 4px 14px; border-radius: 20px; cursor: pointer; font-size: 0.75rem; font-weight: 600; letter-spacing: 1px; backdrop-filter: blur(5px); transition: all 0.3s; }
        #toggle-menu:hover { background: rgba(255, 107, 139, 0.4); color: #fff; }
    </style>
</head>
<body>

    <div id="intro">
        <h1>O Universo de Nós Dois</h1>
        <p>Um espaço inteiro com todas as estrelas e planetas feito para te mostrar que o meu amor por você não cabe apenas na Terra.</p>
        <button id="btn-start" onclick="iniciar()">Iniciar Passeio</button>
    </div>

    <div id="nav-container">
        <button id="toggle-menu" onclick="AlternarMenu()">Esconder Painel 👁️</button>
        <div id="nav-menu">
            <button class="nav-btn" onclick="mudarFoco('sun')">☀️ Sol</button>
            <button class="nav-btn" onclick="mudarFoco('mercurio')">Mercúrio</button>
            <button class="nav-btn" onclick="mudarFoco('venus')">Vênus</button>
            <button class="nav-btn active" onclick="mudarFoco('earth')">🌍 Terra</button>
            <button class="nav-btn" onclick="mudarFoco('marte')">Marte</button>
            <button class="nav-btn" onclick="mudarFoco('jupiter')">🪐 Maria (Júpiter)</button>
            <button class="nav-btn" onclick="mudarFoco('saturno')">Saturno</button>
            <button class="nav-btn" onclick="mudarFoco('urano')">Urano</button>
            <button class="nav-btn" onclick="mudarFoco('netuno')">Netuno</button>
            <button class="nav-btn" onclick="mudarFoco('plutao')">Plutão</button>
            <button class="nav-btn align-btn" onclick="alinharCamera()">✨ Focar de Perto</button>
        </div>
    </div>
    
    <div id="hud">
        <h2 id="msg-title">Calculando órbitas...</h2>
        <p id="msg-body">Alinhando estrelas para a Maria.</p>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
        import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js';

        // 1. MOTOR DO ESPAÇO
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const loader = new THREE.TextureLoader();
        let focoAtual = 'earth';
        
        // Coordenadas mundiais dos planetas (vão atualizar dinamicamente no motor)
        const posicoesGlobais = { sun: new THREE.Vector3(20000, 0, 0) };

        // 2. VIA LÁCTEA REALISTA ESPIRALADA (Remodelada para ficar perfeita)
        const galaxyGeometry = new THREE.BufferGeometry();
        const gPoints = 160000;
        const gPositions = new Float32Array(gPoints * 3);
        const gColors = new Float32Array(gPoints * 3);
        
        const colCore = new THREE.Color('#ff7ea5'); // Brilho central suave
        const colArm = new THREE.Color('#4c3b99');  // Braços roxos azulados profundos

        for(let i = 0; i < gPoints; i++) {
            const i3 = i * 3;
            const r = Math.pow(Math.random(), 2.5) * 65000; // Distribuição orgânica densa no centro
            const arms = 4;
            const theta = ((i % arms) / arms) * Math.PI * 2 + (r * 0.00006); // Curvatura perfeita

            // Dispersão suave de poeira estelar nas bordas (Adeus formato esquisito)
            const spread = Math.pow(Math.random(), 2) * (Math.random() < 0.5 ? 1 : -1) * r * 0.12;
            const ySpread = (Math.random() - 0.5) * (65000 - r) * 0.05;

            gPositions[i3] = Math.cos(theta) * r + spread;
            gPositions[i3+1] = ySpread;
            gPositions[i3+2] = Math.sin(theta) * r + (Math.random() - 0.5) * r * 0.12;

            const finalCol = colCore.clone().lerp(colArm, r / 65000);
            if(Math.random() > 0.95) finalCol.addScalar(0.4); // Estrelas brilhando forte isoladas
            
            gColors[i3] = finalCol.r;
            gColors[i3+1] = finalCol.g;
            gColors[i3+2] = finalCol.b;
        }
        galaxyGeometry.setAttribute('position', new THREE.BufferAttribute(gPositions, 3));
        galaxyGeometry.setAttribute('color', new THREE.BufferAttribute(gColors, 3));

        // Textura redonda suave para as estrelas
        const pCanvas = document.createElement('canvas'); pCanvas.width = 16; pCanvas.height = 16;
        const gCtx = pCanvas.getContext('2d');
        const grad = gCtx.createRadialGradient(8,8,0, 8,8,8);
        grad.addColorStop(0, 'rgba(255,255,255,1)'); grad.addColorStop(1, 'rgba(255,255,255,0)');
        gCtx.fillStyle = grad; gCtx.fillRect(0,0,16,16);

        const galaxyMaterial = new THREE.PointsMaterial({
            size: 110, sizeAttenuation: true, depthWrite: false,
            blending: THREE.AdditiveBlending, vertexColors: true,
            transparent: true, map: new THREE.CanvasTexture(pCanvas), opacity: 0.85
        });
        const galaxy = new THREE.Points(galaxyGeometry, galaxyMaterial);
        scene.add(galaxy);

        // 3. GRUPO DO SISTEMA SOLAR (Centralizado num braço bonito da Via Láctea)
        const solarSystem = new THREE.Group();
        solarSystem.position.set(20000, 0, 0);
        scene.add(solarSystem);

        scene.add(new THREE.AmbientLight(0x2d2540));
        const sunLight = new THREE.PointLight(0xfff5ea, 3, 80000);
        solarSystem.add(sunLight);

        // O SOL - COMBUSTÍVEL DO AMOR
        const sun = new THREE.Mesh(new THREE.SphereGeometry(35, 64, 64), new THREE.MeshBasicMaterial({ color: 0xff9922 }));
        const sunGlow = new THREE.Mesh(new THREE.SphereGeometry(39, 32, 32), new THREE.MeshBasicMaterial({ color: 0xff4400, transparent: true, opacity: 0.3, side: THREE.BackSide }));
        sun.add(sunGlow);
        solarSystem.add(sun);

        // 4. LUA DE CORAÇÃO REALISTA DA TERRA
        function gerarGeometriaCoracao3D() {
            const x = 0, y = 0;
            const shape = new THREE.Shape();
            shape.moveTo( x + 5, y + 5 );
            shape.bezierCurveTo( x + 5, y + 5, x + 4, y, x, y );
            shape.bezierCurveTo( x - 6, y, x - 6, y + 7, x - 6, y + 7 );
            shape.bezierCurveTo( x - 6, y + 11, x - 3, y + 15.4, x + 5, y + 19 );
            shape.bezierCurveTo( x + 12, y + 15.4, x + 16, y + 11, x + 16, y + 7 );
            shape.bezierCurveTo( x + 16, y + 7, x + 16, y, x + 10, y );
            shape.bezierCurveTo( x + 7, y, x + 5, y + 5, x + 5, y + 5 );
            const settings = { depth: 4, bevelEnabled: true, bevelSegments: 5, steps: 1, bevelSize: 1.5, bevelThickness: 1.5 };
            const geo = new THREE.ExtrudeGeometry(shape, settings);
            geo.center(); geo.scale(0.2, 0.2, 0.2);
            return geo;
        }

        // Criando a Terra
        const earthGroup = new THREE.Group();
        const earth = new THREE.Mesh(new THREE.SphereGeometry(7.5, 64, 64), new THREE.MeshStandardMaterial({
            map: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg'), roughness: 0.5
        }));
        earthGroup.add(earth);

        // Lua de Coração Rochosa Vermelha/Rosa
        const heartMoonGeo = gerarGeometriaCoracao3D();
        const heartMoonMat = new THREE.MeshStandardMaterial({
            color: 0xff4466, roughness: 0.9, metalness: 0.1,
            bumpMap: loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/water/waterbump.chile.jpg'), bumpScale: 0.2
        });
        const heartMoon = new THREE.Mesh(heartMoonGeo, heartMoonMat);
        heartMoon.position.set(22, 2, 0);
        earthGroup.add(heartMoon);
        solarSystem.add(earthGroup);

        // 5. JÚPITER COM O NOME "MARIA" DENTRO
        const jupiterGroup = new THREE.Group();
        const jupiter = new THREE.Mesh(new THREE.SphereGeometry(18, 64, 64), new THREE.MeshStandardMaterial({ color: 0xe0a96d, roughness: 0.6 }));
        jupiterGroup.add(jupiter);
        solarSystem.add(jupiterGroup);

        // Criando o Canvas para projetar o Nome Maria brilhando na atmosfera do planeta
        const nameCanvas = document.createElement('canvas'); nameCanvas.width = 512; nameCanvas.height = 256;
        const nCtx = nameCanvas.getContext('2d');
        nCtx.fillStyle = 'rgba(0,0,0,0)'; nCtx.fillRect(0,0,512,256);
        nCtx.font = 'Bold 75px sans-serif'; nCtx.fillStyle = '#ffffff'; nCtx.textAlign = 'center';
        nCtx.shadowColor = '#ff4477'; nCtx.shadowBlur = 20;
        nCtx.fillText('MARIA', 256, 140);
        
        const nameTex = new THREE.CanvasTexture(nameCanvas);
        const nameRing = new THREE.Mesh(new THREE.BufferGeometry(), new THREE.MeshBasicMaterial({ map: nameTex, transparent: true, side: THREE.DoubleSide, blending: THREE.AdditiveBlending }));
        // Criar uma faixa sutil ao redor de júpiter exibindo o nome
        nameRing.geometry = new THREE.SphereGeometry(18.4, 32, 32);
        jupiter.add(nameRing);


        // 6. ADICIONANDO TODOS OS OUTROS PLANETAS DO SISTEMA SOLAR
        const infoPlanetas = [
            { name: 'mercurio', size: 2.5, dist: 60, color: 0x888888, speed: 0.004 },
            { name: 'venus', size: 5.8, dist: 95, color: 0xe3bb87, speed: 0.003 },
            { name: 'marte', size: 4.0, dist: 195, color: 0xc1440e, speed: 0.0016 },
            { name: 'saturno', size: 14.5, dist: 330, color: 0xe2bf7d, speed: 0.0009, ring: true },
            { name: 'urano', size: 9.0, dist: 420, color: 0x4fe3d6, speed: 0.0005 }, // Azul Preferido Dela!
            { name: 'netuno', size: 8.5, dist: 500, color: 0x6a2da8, speed: 0.0003 }, // Roxinho Seu!
            { name: 'plutao', size: 1.5, dist: 560, color: 0x7a6b58, speed: 0.0002 }
        ];

        const meshesPlanetas = {};
        infoPlanetas.forEach(p => {
            const grupo = new THREE.Group();
            const mesh = new THREE.Mesh(new THREE.SphereGeometry(p.size, 48, 48), new THREE.MeshStandardMaterial({ color: p.color, roughness: 0.7 }));
            grupo.add(mesh);
            
            if(p.ring) { // Anel de Saturno
                const rGeo = new THREE.RingGeometry(p.size + 3, p.size + 14, 64);
                const rMat = new THREE.MeshStandardMaterial({ color: 0xa88e67, side: THREE.DoubleSide, transparent: true, opacity: 0.6 });
                const rMesh = new THREE.Mesh(rGeo, rMat); rMesh.rotation.x = Math.PI/2.2;
                grupo.add(rMesh);
            }
            solarSystem.add(grupo);
            meshesPlanetas[p.name] = { group: grupo, mesh: mesh, dist: p.dist, angle: Math.random()*10, speed: p.speed };
        });

        // Incluindo dados da Terra e Júpiter na lista de atualização
        meshesPlanetas['earth'] = { group: earthGroup, mesh: earth, dist: 140, angle: 1, speed: 0.002 };
        meshesPlanetas['jupiter'] = { group: jupiterGroup, mesh: jupiter, dist: 260, angle: 4, speed: 0.001 };


        // 7. TEXTOS SIMPLES, LINDOS E SUPER ESPECIAIS (Estilo Ensino Médio)
        const textos = {
            sun: { title: "O Sol: Nosso Combustível ☀️", body: "O Sol é o coração do sistema solar. Ele brilha sem parar e dá energia para tudo. Eu fiz dele o nosso combustível: enquanto ele estiver brilhando no céu, o meu amor por você vai ser eterno e nunca vai apagar." },
            mercurio: { title: "Mercúrio Pequenino", body: "Ele é o planeta mais rapidinho e fica bem perto do Sol. É como eu correndo pra te ver sempre que dá saudade!" },
            venus: { title: "Vênus Brilhante", body: "Vênus é o planeta mais quente e brilha tanto que parece uma joia no céu. Ele lembra o brilho dos seus olhos quando você sorri pra mim." },
            earth: { title: "Planeta Amor (Terra) 🌍", body: "Olha que lindo! Em vez de uma lua normal, a Terra agora tem uma Lua de Coração feita de rocha pura. Ela está aí para provar que até a força da gravidade do nosso mundo é feita de amor." },
            marte: { title: "Marte Vermelho", body: "O planeta vermelho e cheio de mistérios. Ele representa a nossa força e a paixão que faz a nossa história ser tão viva e bonita." },
            jupiter: { title: "Júpiter da Minha Maria ✨❤️", body: "Este é o maior planeta do universo, e eu escrevi o seu nome bem ali no meio dele! Eu amo esse planeta, mas amo muito, muito mais você. Júpiter é gigante, mas é menor do que o espaço que você ocupa na minha vida." },
            saturno: { title: "Saturno e Seus Anéis", body: "Saturno é lindo e cheio de anéis charmosos. É o planeta que mostra que as coisas mais bonitas do mundo merecem ser cuidadas com todo o carinho." },
            urano: { title: "Urano Azul-Piscina 💎", body: "Este é o gigante de gelo que eu pintei com o seu azul preferido. Ele é calmo, lindo e tem uma cor que transmite paz, exatamente o que eu sinto quando estou com você." },
            netuno: { title: "Netuno Roxo Cósmico 🔮", body: "O outro gigante de gelo, brilhando no meu roxo preferido. Viu como ele e Urano ficam lindos juntos no espaço? Somos eu e você na imensidão." },
            plutao: { title: "Plutão Solitário", body: "Ele está lá no finalzinho, pequenino e esquecido. Mas aqui no nosso universo ele é importante, porque até a menor parte do espaço me lembra você." },
            universo: { title: "A Via-Láctea Espiral", body: "Olha como as estrelas se formam em espiral de forma tão perfeita e suave ao fundo. O universo inteiro faz sentido quando estou do seu lado." }
        };

        // CONTROLES
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05;
        controls.minDistance = 10; controls.maxDistance = 120000;

        camera.position.set(20140, 15, 25);
        controls.target.set(20140, 0, 0);

        const uiTitle = document.getElementById('msg-title');
        const uiBody = document.getElementById('msg-body');

        window.iniciar = () => {
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('hud').style.opacity = '1';
                mudarFoco('earth');
            }, 1500);
        };

        window.mudarFoco = (alvo) => {
            focoAtual = alvo;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const btn = Array.from(document.querySelectorAll('.nav-btn')).find(b => b.onclick.toString().includes(`'${alvo}'`));
            if(btn) btn.classList.add('active');

            if(textos[alvo]) {
                uiTitle.innerText = textos[alvo].title;
                uiBody.innerText = textos[alvo].body;
            }
        };

        window.alinharCamera = () => {
            const p = obterPosicaoFoco();
            const offset = focoAtual === 'sun' ? 75 : 25;
            camera.position.set(p.x + offset, p.y + 12, p.z + offset);
            controls.target.copy(p);
            controls.update();
        };

        window.AlternarMenu = () => {
            const menu = document.getElementById('nav-menu');
            const btn = document.getElementById('toggle-menu');
            if(menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
                btn.innerText = "Esconder Painel 👁️";
            } else {
                menu.classList.add('hidden');
                btn.innerText = "Mostrar Planetas 🪐";
            }
        };

        function obterPosicaoFoco() {
            if(focoAtual === 'sun') return solarSystem.position;
            const p = posicoesGlobais[focoAtual];
            return p ? p : solarSystem.position;
        }

        // 8. LOOP DE ANIMAÇÃO DO ESPAÇO
        function animate() {
            requestAnimationFrame(animate);

            const tempo = Date.now() * 0.0005;

            // Girar o Sol e a Galáxia suavemente
            sun.rotation.y += 0.001;
            galaxy.rotation.y += 0.00015;

            // Mover a Lua de coração da terra e rotacioná-la
            heartMoon.position.x = Math.cos(tempo * 2.5) * 16;
            heartMoon.position.z = Math.sin(tempo * 2.5) * 16;
            heartMoon.rotation.y += 0.01;
            heartMoon.rotation.x += 0.005;

            // Calcular Translação Real de todos os planetas na Órbita
            for(let chave in meshesPlanetas) {
                const p = meshesPlanetas[chave];
                p.angle += p.speed;
                p.group.position.x = Math.cos(p.angle) * p.dist;
                p.group.position.z = Math.sin(p.angle) * p.dist;
                p.mesh.rotation.y += 0.01;

                // Guardar posição real para a câmera rastrear no espaço
                if(!posicoesGlobais[chave]) posicoesGlobais[chave] = new THREE.Vector3();
                p.group.getWorldPosition(posicoesGlobais[chave]);
            }

            // Seguir dinamicamente o planeta selecionado
            const alvoCam = obterPosicaoFoco();
            controls.target.lerp(alvoCam, 0.08);

            // Se ela afastar demais a câmera no infinito, muda o texto para a Via-Láctea
            if(camera.position.distanceTo(alvoCam) > 2200) {
                uiTitle.innerText = textos.universo.title;
                uiBody.innerText = textos.universo.body;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
