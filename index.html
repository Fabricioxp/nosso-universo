<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jornada Infinito</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: white; font-family: sans-serif; }
        #info { position: absolute; bottom: 5%; width: 100%; text-align: center; pointer-events: none; }
    </style>
</head>
<body>
    <div id="info"><p id="text">...</p></div>
    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        // Cena com LogarithmicDepthBuffer (ESSENCIAL para não travar o zoom)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.01, 1000000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Terra
        const earth = new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), new THREE.MeshBasicMaterial({ color: 0x2244ff }));
        scene.add(earth);

        // Galáxia (Estrelas em volta)
        const stars = new THREE.Points(
            new THREE.BufferGeometry().setAttribute('position', new THREE.BufferAttribute(new Float32Array(50000 * 3).map(() => (Math.random()-0.5)*20000), 3)),
            new THREE.PointsMaterial({ size: 1 })
        );
        scene.add(stars);

        camera.position.z = 1.2;
        let zoomSpeed = 1.05; // Fator multiplicativo para zoom infinito
        let currentZ = 1.2;

        window.addEventListener('wheel', (e) => {
            // A lógica de zoom agora é multiplicativa, não fixa
            if (e.deltaY > 0) currentZ *= zoomSpeed; 
            else currentZ /= zoomSpeed;
            
            currentZ = Math.max(1.2, currentZ); // Permite afastar quase infinitamente
            camera.position.z = currentZ;

            // Texto dinâmico
            const t = document.getElementById('text');
            if (currentZ < 10) t.innerText = "Em meio a bilhões de pessoas, nos encontramos.";
            else if (currentZ < 1000) t.innerText = "Tão pequenos no Sistema Solar...";
            else t.innerText = "O Universo inteiro conspira pelo nosso amor.";
        }, {passive: false});

        function animate() {
            requestAnimationFrame(animate);
            earth.rotation.y += 0.005;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
