<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jornada Infinita</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        #hud { position: absolute; bottom: 10%; width: 100%; text-align: center; pointer-events: none; }
        .controls { position: absolute; bottom: 2%; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; z-index: 100; }
        button { padding: 10px 20px; cursor: pointer; pointer-events: all; border-radius: 20px; border: none; background: #fff; }
    </style>
</head>
<body>
    <div id="hud"><p id="msg">Em meio a bilhões, nos encontramos.</p></div>
    <div class="controls">
        <button onclick="changeZoom(-50)">Aproximar</button>
        <button onclick="changeZoom(50)">Afastar</button>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.01, 100000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Terra com Textura de Alta Qualidade
        const earth = new THREE.Mesh(
            new THREE.SphereGeometry(1, 64, 64),
            new THREE.MeshBasicMaterial({ map: new THREE.TextureLoader().load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/planets/earth_atmos_2048.jpg') })
        );
        scene.add(earth);

        // Sistema Solar (Planetas reais)
        const planets = new THREE.Group();
        [{d: 10, c: 0xff4422}, {d: 20, c: 0xffaa00}].forEach(p => {
            const m = new THREE.Mesh(new THREE.SphereGeometry(0.8, 32, 32), new THREE.MeshBasicMaterial({color: p.c}));
            m.position.x = p.d;
            planets.add(m);
        });
        scene.add(planets);

        // Galáxia (Fundo realista)
        const galaxy = new THREE.Mesh(new THREE.SphereGeometry(2000, 32, 32), new THREE.MeshBasicMaterial({ 
            map: new THREE.TextureLoader().load('https://upload.wikimedia.org/wikipedia/commons/4/43/ESO-VLT-Laser-phot.jpg'), 
            side: THREE.BackSide 
        }));
        scene.add(galaxy);

        camera.position.z = 0.8; // Começa dentro da Terra
        window.changeZoom = (val) => { camera.position.z = Math.max(0.8, camera.position.z + val); };

        function updateNarrative() {
            const z = camera.position.z;
            const m = document.getElementById('msg');
            if (z < 5) m.innerText = "Em meio a bilhões de pessoas, nos encontramos.";
            else if (z < 100) m.innerText = "Nosso sistema solar é um detalhe...";
            else m.innerText = "O universo inteiro conspira pelo nosso amor.";
        }

        function animate() {
            requestAnimationFrame(animate);
            earth.rotation.y += 0.002;
            updateNarrative();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
